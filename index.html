<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhelana Youth Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dark: #9A7A2E;
  --navy: #0B1A2E;
  --navy-mid: #122340;
  --navy-light: #1A3254;
  --cream: #F5F0E8;
  --white: #FFFFFF;
  --green: #2ECC71;
  --red: #E74C3C;
  --blue-accent: #3498DB;
  --text-muted: #8A9BB0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== PARTICLE BG ===== */
#particles-canvas {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:0; opacity:0.4;
}

/* ===== LOADER ===== */
#loader {
  position:fixed; inset:0; background:var(--navy); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity 0.8s ease;
}
#loader .logo-anim { animation: logoSpin 1.5s ease forwards; }
@keyframes logoSpin {
  0%{transform:scale(0) rotate(-180deg);opacity:0}
  60%{transform:scale(1.1) rotate(10deg);opacity:1}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
#loader .loader-bar {
  width:200px; height:3px; background:var(--navy-light);
  border-radius:2px; margin-top:24px; overflow:hidden;
}
#loader .loader-fill {
  height:100%; width:0%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
  border-radius:2px; animation: loadFill 2s ease forwards;
}
@keyframes loadFill { to { width:100%; } }
#loader p { margin-top:12px; color:var(--gold); font-size:13px; letter-spacing:3px; text-transform:uppercase; }

/* ===== MAIN APP ===== */
#app { position:relative; z-index:1; min-height:100vh; }

/* ===== SECTIONS ===== */
.section { display:none; animation: fadeSlideIn 0.5s ease; }
.section.active { display:block; }
@keyframes fadeSlideIn {
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== LOGIN PAGE ===== */
#login-page {
  min-height:100vh; display:none; align-items:center; justify-content:center;
  position:relative;
}
#login-page.active { display:flex; }
.login-card {
  background: linear-gradient(135deg, rgba(18,35,64,0.95) 0%, rgba(26,50,84,0.95) 100%);
  border:1px solid rgba(201,168,76,0.3);
  border-radius:20px; padding:48px 40px;
  width:420px; max-width:95vw;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.1);
  position:relative; overflow:hidden;
  animation: cardAppear 0.8s cubic-bezier(0.34,1.56,0.64,1) 2.2s both;
}
@keyframes cardAppear {
  from{opacity:0;transform:scale(0.8) translateY(30px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.login-card::before {
  content:''; position:absolute; top:-50%; left:-50%;
  width:200%; height:200%;
  background: radial-gradient(circle at 60% 40%, rgba(201,168,76,0.05) 0%, transparent 60%);
  pointer-events:none;
}
.bank-logo {
  text-align:center; margin-bottom:32px;
}
.logo-icon {
  width:80px; height:80px; margin:0 auto 16px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  border-radius:20px; display:flex; align-items:center; justify-content:center;
  font-size:36px; box-shadow: 0 8px 32px rgba(201,168,76,0.3);
  position:relative; overflow:hidden;
}
.logo-icon::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2));
}
.bank-name {
  font-family:'Playfair Display', serif;
  font-size:26px; font-weight:900;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1.1;
}
.bank-tagline { font-size:11px; letter-spacing:3px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; }

.login-tabs { display:flex; gap:8px; margin-bottom:28px; background:rgba(255,255,255,0.05); border-radius:10px; padding:4px; }
.tab-btn {
  flex:1; padding:10px; border:none; background:transparent;
  color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
  border-radius:8px; cursor:pointer; transition:all 0.3s;
}
.tab-btn.active { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color:var(--navy); font-weight:700; }

.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.form-group input {
  width:100%; padding:14px 16px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.2);
  border-radius:10px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:15px;
  transition:all 0.3s; outline:none;
}
.form-group input:focus { border-color:var(--gold); background:rgba(201,168,76,0.08); box-shadow:0 0 0 3px rgba(201,168,76,0.1); }
.form-group input::placeholder { color:var(--text-muted); }

.btn-primary {
  width:100%; padding:15px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  border:none; border-radius:10px;
  color:var(--navy); font-family:'DM Sans',sans-serif;
  font-size:15px; font-weight:700; letter-spacing:1px;
  cursor:pointer; transition:all 0.3s;
  box-shadow: 0 4px 20px rgba(201,168,76,0.3);
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(201,168,76,0.4); }
.btn-primary:active { transform:translateY(0); }

.error-msg { color:var(--red); font-size:13px; text-align:center; margin-top:12px; display:none; }
.success-msg { color:var(--green); font-size:13px; text-align:center; margin-top:12px; display:none; }

/* ===== DASHBOARD ===== */
#dashboard { min-height:100vh; }

/* SIDEBAR */
.sidebar {
  position:fixed; left:0; top:0; height:100vh; width:260px;
  background: linear-gradient(180deg, var(--navy-mid) 0%, var(--navy) 100%);
  border-right:1px solid rgba(201,168,76,0.15);
  z-index:100; display:flex; flex-direction:column;
  transition:transform 0.3s ease;
}
.sidebar-logo {
  padding:28px 24px; border-bottom:1px solid rgba(201,168,76,0.1);
  display:flex; align-items:center; gap:14px;
}
.sidebar-logo .logo-icon-sm {
  width:42px; height:42px; min-width:42px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px;
}
.sidebar-logo .bank-name-sm {
  font-family:'Playfair Display',serif; font-size:15px; font-weight:700;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1.2;
}

.sidebar-nav { flex:1; padding:16px 12px; overflow-y:auto; }
.nav-section-label {
  font-size:10px; font-weight:700; letter-spacing:2px;
  color:var(--text-muted); text-transform:uppercase;
  padding:12px 12px 6px;
}
.nav-item {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  border-radius:10px; cursor:pointer; transition:all 0.2s;
  color:var(--text-muted); font-size:14px; font-weight:500; margin-bottom:2px;
}
.nav-item:hover { background:rgba(201,168,76,0.08); color:var(--cream); }
.nav-item.active { background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08)); color:var(--gold); border-left:3px solid var(--gold); }
.nav-item .nav-icon { width:20px; text-align:center; font-size:16px; }
.nav-item .badge {
  margin-left:auto; background:var(--red); color:#fff;
  font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px;
}

.sidebar-footer {
  padding:16px 12px; border-top:1px solid rgba(201,168,76,0.1);
}
.user-info-bar {
  display:flex; align-items:center; gap:10px; padding:12px 14px;
  background:rgba(255,255,255,0.04); border-radius:10px; margin-bottom:8px;
}
.user-avatar {
  width:36px; height:36px; background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700; color:var(--navy); flex-shrink:0;
}
.user-details .user-name { font-size:13px; font-weight:600; color:var(--cream); }
.user-details .user-role { font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:1px; }
.btn-logout {
  width:100%; padding:10px; background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.2);
  border-radius:8px; color:var(--red); font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s;
}
.btn-logout:hover { background:rgba(231,76,60,0.2); }

/* MAIN CONTENT */
.main-content {
  margin-left:260px; min-height:100vh;
  padding:32px; transition:margin 0.3s;
}

.page-header { margin-bottom:32px; }
.page-title {
  font-family:'Playfair Display',serif; font-size:32px; font-weight:900;
  background: linear-gradient(135deg, var(--cream), var(--gold-light));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.page-subtitle { color:var(--text-muted); font-size:14px; margin-top:4px; }

/* STAT CARDS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:32px; }
.stat-card {
  background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
  border:1px solid rgba(201,168,76,0.15); border-radius:16px; padding:24px;
  position:relative; overflow:hidden; transition:transform 0.2s;
}
.stat-card:hover { transform:translateY(-3px); }
.stat-card::before {
  content:''; position:absolute; top:-20px; right:-20px;
  width:80px; height:80px; border-radius:50%;
  background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
}
.stat-icon { font-size:28px; margin-bottom:12px; }
.stat-value {
  font-family:'Playfair Display',serif; font-size:28px; font-weight:700;
  color:var(--gold-light); line-height:1;
}
.stat-label { font-size:12px; color:var(--text-muted); margin-top:6px; text-transform:uppercase; letter-spacing:1px; }
.stat-change { font-size:12px; margin-top:8px; color:var(--green); }

/* TABLES */
.data-card {
  background: linear-gradient(135deg, var(--navy-mid), rgba(26,50,84,0.5));
  border:1px solid rgba(201,168,76,0.15); border-radius:16px;
  overflow:hidden; margin-bottom:24px;
}
.data-card-header {
  padding:20px 24px; border-bottom:1px solid rgba(201,168,76,0.1);
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.data-card-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--cream); }
.data-card-body { padding:0; overflow-x:auto; }

table { width:100%; border-collapse:collapse; }
th {
  padding:14px 20px; text-align:left;
  font-size:11px; font-weight:700; color:var(--gold); letter-spacing:1.5px; text-transform:uppercase;
  background:rgba(201,168,76,0.05); border-bottom:1px solid rgba(201,168,76,0.1);
}
td {
  padding:14px 20px; font-size:14px; color:var(--cream);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(201,168,76,0.04); }

.badge-status {
  padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase;
}
.badge-active { background:rgba(46,204,113,0.15); color:var(--green); }
.badge-pending { background:rgba(52,152,219,0.15); color:var(--blue-accent); }
.badge-overdue { background:rgba(231,76,60,0.15); color:var(--red); }
.badge-paid { background:rgba(46,204,113,0.15); color:var(--green); }

/* BUTTONS */
.btn-sm {
  padding:7px 16px; border-radius:8px; border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
  transition:all 0.2s; display:inline-flex; align-items:center; gap:6px;
}
.btn-gold { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
.btn-gold:hover { background:rgba(201,168,76,0.25); }
.btn-danger { background:rgba(231,76,60,0.15); color:var(--red); border:1px solid rgba(231,76,60,0.3); }
.btn-danger:hover { background:rgba(231,76,60,0.25); }
.btn-success { background:rgba(46,204,113,0.15); color:var(--green); border:1px solid rgba(46,204,113,0.3); }
.btn-success:hover { background:rgba(46,204,113,0.25); }
.btn-info { background:rgba(52,152,219,0.15); color:var(--blue-accent); border:1px solid rgba(52,152,219,0.3); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:500;
  display:none; align-items:center; justify-content:center; padding:16px;
  backdrop-filter:blur(4px);
}
.modal-overlay.active { display:flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
  border:1px solid rgba(201,168,76,0.3); border-radius:20px;
  width:100%; max-width:500px; max-height:90vh; overflow-y:auto;
  animation: modalSlide 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalSlide { from{transform:scale(0.9) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
.modal-header {
  padding:24px 28px 16px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(201,168,76,0.1);
}
.modal-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--gold-light); }
.modal-close { background:none; border:none; color:var(--text-muted); font-size:24px; cursor:pointer; transition:color 0.2s; }
.modal-close:hover { color:var(--cream); }
.modal-body { padding:24px 28px; }
.modal-footer { padding:16px 28px 24px; display:flex; gap:12px; justify-content:flex-end; }

/* FORMS in modals */
.modal .form-group { margin-bottom:16px; }
.modal .form-group label { font-size:11px; font-weight:700; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; display:block; }
.modal .form-group input,
.modal .form-group select,
.modal .form-group textarea {
  width:100%; padding:12px 14px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.2);
  border-radius:10px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:14px;
  transition:all 0.3s; outline:none;
}
.modal .form-group input:focus,
.modal .form-group select:focus { border-color:var(--gold); background:rgba(201,168,76,0.08); }
.modal .form-group select option { background:var(--navy-mid); }
.modal .form-group textarea { resize:vertical; min-height:80px; }

/* TOAST */
#toast-container { position:fixed; bottom:24px; right:24px; z-index:9000; display:flex; flex-direction:column; gap:10px; }
.toast {
  padding:14px 20px; border-radius:12px; font-size:14px; font-weight:500;
  min-width:280px; box-shadow:0 8px 32px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease; display:flex; align-items:center; gap:10px;
}
@keyframes toastIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
.toast.success { background:rgba(46,204,113,0.95); color:#fff; }
.toast.error { background:rgba(231,76,60,0.95); color:#fff; }
.toast.info { background:rgba(52,152,219,0.95); color:#fff; }

/* MOBILE TOGGLE */
.mobile-menu-btn {
  display:none; position:fixed; top:16px; left:16px; z-index:200;
  width:44px; height:44px; background:var(--navy-mid); border:1px solid rgba(201,168,76,0.3);
  border-radius:10px; align-items:center; justify-content:center; cursor:pointer; font-size:20px;
}

/* GRID 2COL */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

/* FORM ROW */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

/* SEARCH */
.search-box {
  position:relative;
}
.search-box input {
  padding:10px 16px 10px 40px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.2);
  border-radius:10px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:14px;
  outline:none; transition:all 0.3s; width:240px;
}
.search-box input:focus { border-color:var(--gold); width:300px; }
.search-box::before {
  content:'🔍'; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px;
}

/* AMOUNT DISPLAY */
.amount-positive { color:var(--green); font-weight:600; }
.amount-negative { color:var(--red); font-weight:600; }
.amount-gold { color:var(--gold); font-weight:700; }

/* RESPONSIVE */
@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main-content { margin-left:0; padding:16px; padding-top:70px; }
  .mobile-menu-btn { display:flex; }
  .grid-2 { grid-template-columns:1fr; }
  .form-row { grid-template-columns:1fr; }
  .stats-grid { grid-template-columns:1fr 1fr; }
}
@media (max-width:480px) {
  .stats-grid { grid-template-columns:1fr; }
}

/* GITHUB CONFIG */
.github-config-notice {
  background:rgba(52,152,219,0.1); border:1px solid rgba(52,152,219,0.3);
  border-radius:12px; padding:16px 20px; margin-bottom:24px;
  display:flex; align-items:flex-start; gap:12px; font-size:13px; color:var(--blue-accent);
}

/* PROFILE SECTION */
.profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

/* ABOUT page */
.info-row { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.info-label { color:var(--text-muted); font-size:13px; }
.info-value { color:var(--cream); font-size:13px; font-weight:600; }

/* Animated number */
.animated-num { transition:all 0.5s ease; }

/* Share progress bar */
.share-bar { height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; margin-top:6px; }
.share-fill { height:100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); border-radius:4px; transition:width 1s ease; }

/* OVERVIEW CHART */
.mini-chart { display:flex; align-items:flex-end; gap:4px; height:60px; }
.bar { flex:1; background: linear-gradient(0deg, var(--gold-dark), var(--gold-light)); border-radius:3px 3px 0 0; min-width:8px; opacity:0.7; transition:opacity 0.2s; }
.bar:hover { opacity:1; }

</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<!-- LOADER -->
<div id="loader">
  <div class="logo-anim">
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="logo-icon" style="width:100px;height:100px;font-size:48px;border-radius:24px;margin-bottom:16px">🏛️</div>
      <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:900;background:linear-gradient(135deg,#C9A84C,#E8C97A);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Dhelana Youth Bank</div>
      <div style="font-size:11px;letter-spacing:4px;color:#8A9BB0;text-transform:uppercase;margin-top:4px">Empowering Young India</div>
    </div>
  </div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <p>Loading Your Bank...</p>
</div>

<!-- APP -->
<div id="app">

  <!-- LOGIN PAGE -->
  <div id="login-page" class="section" style="display:flex">
    <div class="login-card">
      <div class="bank-logo">
        <div class="logo-icon">🏛️</div>
        <div class="bank-name">Dhelana Youth Bank</div>
        <div class="bank-tagline">Empowering Young India</div>
      </div>
      <div class="login-tabs">
        <button class="tab-btn active" onclick="switchLoginTab('user')">👤 User Login</button>
        <button class="tab-btn" onclick="switchLoginTab('admin')">🛡️ Admin Login</button>
      </div>
      <div class="form-group">
        <label>User ID</label>
        <input type="text" id="login-userid" placeholder="Enter your User ID" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" />
      </div>
      <button class="btn-primary" onclick="doLogin()">Sign In →</button>
      <div class="error-msg" id="login-error">❌ Invalid credentials. Please try again.</div>
      <div style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted)">
        Secured by Dhelana Youth Bank • Version 1.0
      </div>
      <div id="gh-login-status" style="text-align:center;margin-top:10px;font-size:11px;padding:6px 12px;border-radius:8px;display:none"></div>

<script>
// ============================================================
// GITHUB DATA STORE CONFIG
// ============================================================
const GITHUB_CONFIG = {
  token: '',
  owner: '',
  repo: '',
  path: 'bank-data.json',
  branch: 'main'
};

// Load saved GitHub config IMMEDIATELY before anything else runs
(()=>{
  try {
    const saved = localStorage.getItem('dhelana_github_config');
    if(saved){
      const c = JSON.parse(saved);
      Object.assign(GITHUB_CONFIG, c);
    }
  } catch(e){}
})();

let DB = null;
let currentUser = null;
let currentRole = null;
let currentTab = 'user';
let activePage = 'overview';

// ============================================================
// PARTICLES
// ============================================================
(function(){
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<60;i++) particles.push({
    x:Math.random()*2000, y:Math.random()*1200,
    r:Math.random()*2+0.5,
    vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
    alpha:Math.random()*0.5+0.2
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,168,76,${p.alpha})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ============================================================
// LOADER
// ============================================================
window.addEventListener('load', async ()=>{
  await loadDB();
  setTimeout(()=>{
    const loader = document.getElementById('loader');
    loader.style.opacity = '0';
    setTimeout(()=>{
      loader.style.display='none';
      // Show GitHub connection status on login page

      if(el){
        if(GITHUB_CONFIG.token && GITHUB_CONFIG.owner && GITHUB_CONFIG.repo){
          el.style.display='block';

          el.style.border='1px solid rgba(46,204,113,0.2)';
          el.style.color='#2ECC71';
          el.textContent = `🐙 GitHub Connected: ${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}`;
        } else {
          el.style.display='block';
          el.style.background='rgba(231,76,60,0.08)';
          el.style.border='1px solid rgba(231,76,60,0.15)';

// ============================================================
// DATA LAYER - GitHub + localStorage fallback
// ============================================================
function defaultDB(){
  return {
    settings: { bankName:'Dhelana Youth Bank', sharePrice:500, maxSharesPerUser:100, penaltyRate:2, interestRate:12, loanTenureMonths:12 },
    admins: [{ id:'ADMIN001', password:'admin123', name:'Bank Admin', createdAt: new Date().toISOString() }],
    users: [
      { id:'USR001', password:'pass123', name:'Arjun Patel', shares:10, balance:0, joinDate:'2025-01-01', phone:'9876543210', status:'active' },
      { id:'USR002', password:'pass456', name:'Priya Shah', shares:5, balance:0, joinDate:'2025-01-15', phone:'9876500001', status:'active' }
    ],
    transactions: [],
    loans: [],
    penalties: [],
    sharePayments: [],
    monthlyPayments: []
  };
}

async function loadDB(){
  const def = defaultDB();

  if(GITHUB_CONFIG.token && GITHUB_CONFIG.owner && GITHUB_CONFIG.repo){
    try {
      const res = await fetch(
        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}?t=${Date.now()}`,
        { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Accept': 'application/vnd.github.v3+json', 'Cache-Control': 'no-cache' } }
      );
      if(res.ok){
        const data = await res.json();
        let parsed = {};
        try { parsed = JSON.parse(atob(data.content.replace(/\n/g,''))); } catch(e){ parsed = {}; }

        // If file is empty {} or missing required keys, use defaultDB as base
        if(!parsed.admins && !parsed.users){
          DB = def;
        } else {
          DB = parsed;
        }
        DB._sha = data.sha;

        // Merge in any missing fields
        DB.settings = Object.assign({}, def.settings, DB.settings||{});
        if(!DB.admins || DB.admins.length===0) DB.admins = def.admins;
        if(!DB.users) DB.users = def.users;
        if(!DB.transactions) DB.transactions = [];
        if(!DB.loans) DB.loans = [];
        if(!DB.penalties) DB.penalties = [];
        if(!DB.sharePayments) DB.sharePayments = [];
        if(!DB.monthlyPayments) DB.monthlyPayments = [];
        console.log('✅ Loaded from GitHub. Users:', DB.users.length);
        return;
      } else {
        console.log('GitHub load failed with status:', res.status);
      }
    } catch(e){ console.log('GitHub load error:', e.message); }
  }

  // Fallback: localStorage
  const saved = localStorage.getItem('dhelana_bank_db');
  DB = saved ? JSON.parse(saved) : def;
  DB.settings = Object.assign({}, def.settings, DB.settings||{});
  if(!DB.admins || DB.admins.length===0) DB.admins = def.admins;
  if(!DB.users) DB.users = [];
  if(!DB.transactions) DB.transactions = [];
  if(!DB.loans) DB.loans = [];
  if(!DB.penalties) DB.penalties = [];
  if(!DB.sharePayments) DB.sharePayments = [];
  if(!DB.monthlyPayments) DB.monthlyPayments = [];
  console.log('📦 Loaded from localStorage. Users:', DB.users.length);
}

async function saveDB(){
  // Always save to localStorage as backup
  const payload = {...DB}; delete payload._sha;
  localStorage.setItem('dhelana_bank_db', JSON.stringify(payload));

  if(GITHUB_CONFIG.token && GITHUB_CONFIG.owner && GITHUB_CONFIG.repo){
    try {
      // Always fetch the latest SHA before saving to avoid conflicts
      const getRes = await fetch(
        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}?t=${Date.now()}`,
        { headers: { 'Authorization': `token ${GITHUB_CONFIG.token}`, 'Accept': 'application/vnd.github.v3+json', 'Cache-Control': 'no-cache' } }
      );

      let latestSha = DB._sha || null;
      if(getRes.ok){
        const existing = await getRes.json();
        latestSha = existing.sha; // Always use the freshest SHA
      }

      const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
      const body = {
        message: `Bank update: ${new Date().toLocaleString('en-IN')}`,
        content,
        branch: GITHUB_CONFIG.branch || 'main'
      };
      if(latestSha) body.sha = latestSha;

      const putRes = await fetch(
        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
        { method:'PUT', headers:{ 'Authorization':`token ${GITHUB_CONFIG.token}`, 'Content-Type':'application/json', 'Accept':'application/vnd.github.v3+json' }, body: JSON.stringify(body) }
      );

      if(putRes.ok){
        const d = await putRes.json();
        DB._sha = d.content.sha;
        toast('✅ Saved to GitHub', 'success');
        return;
      } else {
        const err = await putRes.json();
        console.error('GitHub save error:', err);
        if(putRes.status === 401) toast('❌ GitHub: Invalid token — go to GitHub Config', 'error');
        else if(putRes.status === 404) toast('❌ GitHub: Repo/file not found — check GitHub Config', 'error');
        else if(putRes.status === 409) toast('⚠️ GitHub conflict — retrying...', 'info');
        else toast(`❌ GitHub error ${putRes.status} — saved locally`, 'error');
      }
    } catch(e){
      console.error('GitHub save exception:', e);
      toast('⚠️ GitHub unreachable — saved locally', 'info');
    }
  }
  toast('💾 Saved locally (GitHub not configured)', 'info');
}

  errEl.style.display = 'none';
  if(!id||!pw){ showError('Please enter User ID and Password'); return; }

  if(currentTab==='admin'){
    const admin = DB.admins.find(a=>a.id===id && a.password===pw);
    if(!admin){ showError('Invalid admin credentials'); return; }
    currentUser = admin; currentRole = 'admin';
  } else {
    const user = DB.users.find(u=>u.id===id && u.password===pw);
    if(!user){ showError('Invalid user credentials'); return; }

function navigate(page){

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

function showSection(id){

// ============================================================
// PAGE RENDERERS
// ============================================================
function renderPage(page){
  switch(page){
    case 'overview': return currentRole==='admin' ? renderAdminOverview() : renderUserOverview();
    case 'users': return renderUsers();
    case 'add-user': return renderAddUser();
    case 'shares': return renderAdminShares();
    case 'loans': return renderAdminLoans();
    case 'penalties': return renderAdminPenalties();
    case 'transactions': return renderAdminTransactions();
    case 'monthly': return renderMonthlyPayments();
    case 'admin-settings': return renderAdminSettings();
    case 'admin-profile': return renderAdminProfile();
    case 'github-config': return renderGithubConfig();
    case 'my-shares': return renderUserShares();
    case 'my-loans': return renderUserLoans();
    case 'apply-loan': return renderApplyLoan();
    case 'my-penalties': return renderUserPenalties();
    case 'my-transactions': return renderUserTransactions();
    case 'user-profile': return renderUserProfile();
    default: return '<div class="page-header"><h1 class="page-title">Coming Soon</h1></div>';
  }
}

function initPage(page){
  // Animate stat numbers
  document.querySelectorAll('.animated-num').forEach(el=>{
    const target = parseFloat(el.dataset.target||0);
    let cur=0; const step = target/50;
    const iv = setInterval(()=>{
      cur = Math.min(cur+step, target);
      el.textContent = el.dataset.prefix + formatNum(Math.round(cur)) + (el.dataset.suffix||'');
      if(cur>=target) clearInterval(iv);
    },20);
  });
  // Animate share bars
  setTimeout(()=>{
    document.querySelectorAll('.share-fill').forEach(el=>{
      el.style.width = el.dataset.width+'%';
    });
  }, 100);
}

// ============================================================
// HELPERS
// ============================================================
function formatNum(n){ return n.toLocaleString('en-IN'); }
function formatCur(n){ return '₹'+formatNum(n); }
function today(){ return new Date().toISOString().split('T')[0]; }
function now(){ return new Date().toISOString(); }
function uuid(){ return 'ID'+Date.now().toString(36).toUpperCase(); }

function totalShares(userId){
  // Sum all share assignments
  const user = DB.users.find(u=>u.id===userId);
  return user ? (user.shares||0) : 0;
}
function userShareValue(userId){ return totalShares(userId) * DB.settings.sharePrice; }

function totalPenalty(userId){
  return DB.penalties.filter(p=>p.userId===userId&&p.status!=='paid').reduce((a,b)=>a+b.amount,0);
}
function totalLoanPending(userId){
  return DB.loans.filter(l=>l.userId===userId&&l.status==='active').reduce((a,b)=>a+(b.amount-b.paid),0);
}

function saveEditUser(id){

  u.name = document.getElementById('eu-name').value.trim() || u.name;
  u.phone = document.getElementById('eu-phone').value.trim();

}

function setShares(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u) return;
  openModal(`Set Shares — ${u.name}`, `
    <div class="info-row"><span class="info-label">Current Shares</span><span class="info-value amount-gold">${u.shares||0}</span></div>
    <div class="info-row" style="margin-bottom:16px"><span class="info-label">Current Value</span><span class="info-value">${formatCur((u.shares||0)*DB.settings.sharePrice)}</span></div>
    <div class="form-group"><label>New Share Count</label><input type="number" id="ss-shares" value="${u.shares||0}" min="0" max="${DB.settings.maxSharesPerUser||100}" /></div>
    <div style="font-size:12px;color:var(--text-muted)">Share price: ${formatCur(DB.settings.sharePrice)} | Max: ${DB.settings.maxSharesPerUser||100} shares</div>
  `, [{ label:'Update Shares', cls:'btn-primary', action:`saveShares('${id}')` }]);
}

function saveShares(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u) return;
  const val = parseInt(document.getElementById('ss-shares').value)||0;
  if(val < 0){ toast('Shares cannot be negative','error'); return; }
  if(val > (DB.settings.maxSharesPerUser||100)){ toast('Exceeds max shares allowed','error'); return; }
  const diff = val - (u.shares||0);
  u.shares = val;
  // Log transaction
  DB.transactions.push({ id:uuid(), userId:id, type: diff>=0?'credit':'debit', amount:Math.abs(diff)*DB.settings.sharePrice, note:`Share ${diff>=0?'increase':'decrease'}: ${Math.abs(diff)} shares`, date:now() });
  saveDB(); closeModal(); navigate('users');
}

function toggleUser(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u) return;
  u.status = u.status==='active'?'inactive':'active';
  saveDB(); navigate('users');
  toast(`Member ${u.status==='active'?'activated':'deactivated'}`, u.status==='active'?'success':'info');
}

function deleteUser(id){
  if(!confirm('Delete this member? All their data will remain for records.')) return;
  DB.users = DB.users.filter(u=>u.id!==id);
  saveDB(); navigate('users');
  toast('Member removed','info');
}

function previewLoanAdmin(){
  const amount = parseFloat(document.getElementById('nl-amount')?.value)||0;
  const months = parseInt(document.getElementById('nl-tenure')?.value)||1;
  const annualRate = parseFloat(document.getElementById('nl-rate')?.value)||0;
  const preview = document.getElementById('nl-preview');
  if(!preview) return;
  if(!amount){ preview.style.display='none'; return; }
  preview.style.display='block';
  const r = annualRate / 12 / 100;
  let emi, totalPayable, totalInterest;
  if(r===0){ emi=amount/months; totalPayable=amount; totalInterest=0; }
  else { emi=amount*r*Math.pow(1+r,months)/(Math.pow(1+r,months)-1); totalPayable=emi*months; totalInterest=totalPayable-amount; }
  document.getElementById('nl-emi').textContent = formatCur(Math.ceil(emi));
  document.getElementById('nl-interest').textContent = formatCur(Math.round(totalInterest));
  document.getElementById('nl-total').textContent = formatCur(Math.round(totalPayable));
}

function saveLoan(){
  const userId = document.getElementById('nl-user').value;
  const amount = parseFloat(document.getElementById('nl-amount').value)||0;
  const months = parseInt(document.getElementById('nl-tenure').value)||1;
  const annualRate = parseFloat(document.getElementById('nl-rate').value)||(DB.settings.interestRate||12);
  const date = document.getElementById('nl-date').value;
  const desc = document.getElementById('nl-desc').value;
  if(!amount){ toast('Enter loan amount','error'); return; }
  const r = annualRate / 12 / 100;
  const emi = r===0 ? Math.ceil(amount/months) : Math.ceil(amount*r*Math.pow(1+r,months)/(Math.pow(1+r,months)-1));
  const totalPayable = emi * months;
  const loanId = 'LN'+Date.now().toString(36).toUpperCase();
  DB.loans.push({ id:loanId, userId, amount, paid:0, date:date+'T00:00:00', status:'active', desc, tenure:months, emi, totalPayable, interestRate:annualRate });
  DB.transactions.push({ id:uuid(), userId, type:'debit', amount, note:`Loan issued: ${loanId}. ${desc}`, date:date+'T00:00:00' });
  saveDB(); closeModal(); navigate('loans');
  toast(`Loan issued! EMI: ${formatCur(emi)}/month`, 'success');
}

function viewLoanDetails(loanId){
  const l = DB.loans.find(l=>l.id===loanId);
  if(!l) return;
  const u = DB.users.find(u=>u.id===l.userId)||{name:'Unknown'};
  const bal = l.amount - l.paid;
  const pct = Math.min(100,(l.paid/l.amount)*100);
  openModal(`Loan Details — ${loanId}`, `
    <div class="info-row"><span class="info-label">Member</span><span class="info-value">${u.name} (${u.id})</span></div>

    <div class="info-row"><span class="info-label">Monthly EMI</span><span class="info-value" style="color:var(--gold-light)">${l.emi?formatCur(l.emi):'—'}</span></div>
    <div class="info-row"><span class="info-label">Interest Rate</span><span class="info-value">${l.interestRate||'—'}% p.a.</span></div>
    <div class="info-row"><span class="info-label">Tenure</span><span class="info-value">${l.tenure||'—'} months</span></div>
    <div class="info-row"><span class="info-label">Total Payable</span><span class="info-value">${l.totalPayable?formatCur(l.totalPayable):'—'}</span></div>
    <div class="info-row"><span class="info-label">Amount Paid</span><span class="info-value amount-positive">${formatCur(l.paid)}</span></div>
    <div class="info-row"><span class="info-label">Balance</span><span class="info-value ${bal>0?'amount-negative':'amount-positive'}">${formatCur(bal)}</span></div>
    <div class="info-row"><span class="info-label">Purpose</span><span class="info-value" style="color:var(--text-muted)">${l.desc||'—'}</span></div>
    <div class="info-row"><span class="info-label">Issued On</span><span class="info-value">${l.date?.split('T')[0]}</span></div>

      <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">Repayment Progress</div>
      <div style="height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold-dark),var(--green));border-radius:5px;transition:width 1s"></div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${pct.toFixed(1)}% repaid</div>
    </div>
  `, [{ label:'💵 Record Payment', cls:'btn-primary', action:`closeModal();recordLoanPayment('${loanId}')` }]);
}

function recordLoanPayment(loanId){
  const loan = DB.loans.find(l=>l.id===loanId);
  if(!loan) return;
  const bal = loan.amount - loan.paid;
  openModal('Record Loan Payment', `
    <div class="info-row"><span class="info-label">Loan ID</span><span class="info-value amount-gold">${loanId}</span></div>
    <div class="info-row"><span class="info-label">Outstanding</span><span class="info-value amount-negative">${formatCur(bal)}</span></div>
    <div class="form-group" style="margin-top:16px"><label>Payment Amount (₹)</label><input type="number" id="lp-amount" placeholder="Amount paid" max="${bal}" /></div>
    <div class="form-group"><label>Payment Date</label><input type="date" id="lp-date" value="${today()}" /></div>
  `, [{ label:'Record Payment', cls:'btn-primary', action:`saveLoanPayment('${loanId}')` }]);
}

function saveLoanPayment(loanId){
  const loan = DB.loans.find(l=>l.id===loanId);
  if(!loan) return;
  const amt = parseFloat(document.getElementById('lp-amount').value)||0;
  const date = document.getElementById('lp-date').value;
  if(!amt){ toast('Enter payment amount','error'); return; }
  loan.paid += amt;
  if(loan.paid >= loan.amount){ loan.paid = loan.amount; loan.status = 'closed'; }
  DB.transactions.push({ id:uuid(), userId:loan.userId, type:'credit', amount:amt, note:`Loan payment: ${loanId}`, date:date+'T00:00:00' });
  saveDB(); closeModal(); navigate('loans');
  toast('Payment recorded','success');
}

function saveGithubConfig(){
  GITHUB_CONFIG.token = document.getElementById('gh-token').value.trim();
  GITHUB_CONFIG.owner = document.getElementById('gh-owner').value.trim();
  GITHUB_CONFIG.repo = document.getElementById('gh-repo').value.trim();

  GITHUB_CONFIG.path = document.getElementById('gh-path').value.trim()||'bank-data.json';

  // Save to localStorage so it persists across sessions
  localStorage.setItem('dhelana_github_config', JSON.stringify({
    token: GITHUB_CONFIG.token,
    owner: GITHUB_CONFIG.owner,
    repo: GITHUB_CONFIG.repo,
    branch: GITHUB_CONFIG.branch,
    path: GITHUB_CONFIG.path
  }));
  toast('✅ GitHub config saved! Now click Push Data Now.', 'success');
}

async function testGithubConnection(){
  const status = document.getElementById('gh-status');
  status.innerHTML = '<span style="color:var(--gold)">⏳ Testing connection...</span>';
  try {
    const res = await fetch(`https://api.github.com/repos/${document.getElementById('gh-owner').value}/${document.getElementById('gh-repo').value}`, {
      headers:{ 'Authorization':`token ${document.getElementById('gh-token').value}` }
    });
    if(res.ok){
      status.innerHTML = '<span style="color:var(--green)">✅ Connection successful! Repository found.</span>';
    } else {
      status.innerHTML = `<span style="color:var(--red)">❌ Connection failed (${res.status}). Check credentials.</span>`;
    }
  } catch(e){
    status.innerHTML = '<span style="color:var(--red)">❌ Network error. Check your token and repo name.</span>';
  }
}

async function pushToGithub(){
  const statusEl = document.getElementById('gh-status');
  statusEl.innerHTML = '<span style="color:var(--gold)">⬆️ Pushing all data to GitHub...</span>';
  DB._sha = null; // Force fresh SHA fetch
  await saveDB();
  statusEl.innerHTML = '<span style="color:var(--green)">✅ All data pushed to GitHub successfully! Check your repo to verify.</span>';
}

function calcLoanPreview(){
  const principal = parseFloat(document.getElementById('la-amount').value)||0;
  const months = parseInt(document.getElementById('la-tenure').value)||1;
  const annualRate = DB.settings.interestRate || 12;
  const r = annualRate / 12 / 100; // monthly rate

  if(principal <= 0){ 
    document.getElementById('loan-calc-result').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px 0;font-size:14px">Enter loan amount and tenure to see the repayment breakdown</div>';
    document.getElementById('emi-schedule-card').style.display='none';
    return;
  }

  // EMI formula: P * r * (1+r)^n / ((1+r)^n - 1)
  let emi, totalPayable, totalInterest;
  if(r === 0){
    emi = principal / months;
    totalPayable = principal;
    totalInterest = 0;
  } else {
    emi = principal * r * Math.pow(1+r, months) / (Math.pow(1+r, months) - 1);
    totalPayable = emi * months;
    totalInterest = totalPayable - principal;
  }

  document.getElementById('loan-calc-result').innerHTML = `
    <div class="highlight-box">
      <div class="big-num">${formatCur(Math.ceil(emi))}</div>
      <div class="big-label">Monthly EMI</div>
    </div>
    <div class="calc-row"><span class="calc-label">Loan Amount</span><span class="calc-value amount-gold">${formatCur(principal)}</span></div>
    <div class="calc-row"><span class="calc-label">Interest Rate</span><span class="calc-value">${annualRate}% per annum</span></div>
    <div class="calc-row"><span class="calc-label">Tenure</span><span class="calc-value">${months} months</span></div>
    <div class="calc-row"><span class="calc-label">Total Interest</span><span class="calc-value amount-negative">${formatCur(Math.round(totalInterest))}</span></div>
    <div class="calc-row" style="border-top:1px solid rgba(201,168,76,0.2);margin-top:4px;padding-top:16px">
      <span class="calc-label" style="font-weight:700;color:var(--cream)">Total Amount Payable</span>
      <span class="calc-value" style="color:var(--gold);font-size:18px">${formatCur(Math.round(totalPayable))}</span>
    </div>
  `;

  // Build schedule
  let balance = principal;
  let rows = '';
  const startDate = new Date();
  for(let m=1; m<=Math.min(months,36); m++){
    const interestForMonth = balance * r;
    const principalForMonth = emi - interestForMonth;
    balance -= principalForMonth;
    if(balance < 0) balance = 0;
    const dueDate = new Date(startDate);
    dueDate.setMonth(dueDate.getMonth() + m);
    rows += `<tr>
      <td style="color:var(--text-muted)">${m}</td>
      <td style="color:var(--text-muted)">${dueDate.toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</td>
      <td class="amount-gold">${formatCur(Math.ceil(emi))}</td>
      <td class="amount-positive">${formatCur(Math.round(principalForMonth))}</td>
      <td class="amount-negative">${formatCur(Math.round(interestForMonth))}</td>
      <td style="color:${balance<1?'var(--green)':'var(--cream)'}">${formatCur(Math.max(0,Math.round(balance)))}</td>
    </tr>`;
  }
  if(months > 36) rows += `<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:12px">... and ${months-36} more months</td></tr>`;

  document.getElementById('emi-schedule-card').style.display='block';
  document.getElementById('emi-schedule-body').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Due Month</th><th>EMI</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function submitLoanApplication(){
  const amount = parseFloat(document.getElementById('la-amount').value)||0;
  const tenure = parseInt(document.getElementById('la-tenure').value)||1;
  const purpose = document.getElementById('la-purpose').value.trim();
  if(!amount){ toast('Enter loan amount','error'); return; }
  if(!purpose){ toast('Please describe the loan purpose','error'); return; }

  const annualRate = DB.settings.interestRate || 12;
  const r = annualRate / 12 / 100;
  const emi = r > 0
    ? Math.ceil(amount * r * Math.pow(1+r, tenure) / (Math.pow(1+r, tenure) - 1))
    : Math.ceil(amount / tenure);
  const totalPayable = emi * tenure;

  const loanId = 'LN'+Date.now().toString(36).toUpperCase();
  DB.loans.push({
    id: loanId,
    userId: currentUser.id,
    amount,
    paid: 0,
    date: now(),
    status: 'active',
    desc: purpose,
    tenure,
    emi,
    totalPayable,
    interestRate: annualRate,
    appliedByUser: true
  });
  DB.transactions.push({ id:uuid(), userId:currentUser.id, type:'debit', amount, note:`Loan applied: ${loanId}. ${purpose}`, date:now() });
  saveDB();
  toast(`Loan application submitted! EMI: ${formatCur(emi)}/month`, 'success');
  navigate('my-loans');
}

function saveUserProfile(){
  const user = DB.users.find(u=>u.id===currentUser.id);
  if(!user) return;
  const name = document.getElementById('up-name').value.trim();
  const phone = document.getElementById('up-phone').value.trim();
  const newId = document.getElementById('up-newid').value.trim().toUpperCase();
  const curPw = document.getElementById('up-curpw').value;
  const newPw = document.getElementById('up-newpw').value;
  if(name) user.name = name;
  user.phone = phone;
  if(newId){
    if(DB.users.find(u=>u.id===newId&&u.id!==currentUser.id)||DB.admins.find(a=>a.id===newId)){ toast('ID already taken','error'); return; }
    user.id = newId;
  }
  if(newPw){
    if(!curPw){ toast('Enter current password to change it','error'); return; }
    if(curPw !== user.password){ toast('Current password is incorrect','error'); return; }
    user.password = newPw;
  }
  currentUser = user;
  document.getElementById('sidebar-username').textContent = user.name;
  document.getElementById('sidebar-avatar').textContent = user.name[0];
  saveDB(); toast('Profile updated!','success');
}

function openModal(title, body, buttons=[]){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn-sm btn-danger" onclick="closeModal()">✕ Cancel</button>
    ${buttons.map(b=>`<button class="btn-sm btn-primary" style="padding:10px 24px;font-size:14px" onclick="${b.action}">${b.label}</button>`).join('')}
  `;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('active'); }
document.getElementById('modal-overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ============================================================
// TOAST
// ============================================================
function toast(msg, type='info'){
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `${icons[type]||'ℹ️'} ${msg}`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(40px)'; el.style.transition='all 0.3s'; setTimeout(()=>el.remove(), 300); }, 3000);
}
