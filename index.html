<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhelana Youth Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dark: #9A7A2E;
  --navy: #0B1A2E;
  --navy-mid: #122340;
  --navy-light: #1A3254;
  --cream: #F5F0E8;
  --white: #FFFFFF;
  --green: #2ECC71;
  --red: #E74C3C;
  --blue-accent: #3498DB;
  --text-muted: #8A9BB0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== PARTICLE BG ===== */
#particles-canvas {
  position: fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:0; opacity:0.4;
}

/* ===== LOADER ===== */
#loader {
  position:fixed; inset:0; background:var(--navy); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition: opacity 0.8s ease;
}
#loader .logo-anim { animation: logoSpin 1.5s ease forwards; }
@keyframes logoSpin {
  0%{transform:scale(0) rotate(-180deg);opacity:0}
  60%{transform:scale(1.1) rotate(10deg);opacity:1}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
#loader .loader-bar {
  width:200px; height:3px; background:var(--navy-light);
  border-radius:2px; margin-top:24px; overflow:hidden;
}
#loader .loader-fill {
  height:100%; width:0%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
  border-radius:2px; animation: loadFill 2s ease forwards;
}
@keyframes loadFill { to { width:100%; } }
#loader p { margin-top:12px; color:var(--gold); font-size:13px; letter-spacing:3px; text-transform:uppercase; }

/* ===== MAIN APP ===== */
#app { position:relative; z-index:1; min-height:100vh; }

/* ===== SECTIONS ===== */
.section { display:none; animation: fadeSlideIn 0.5s ease; }
.section.active { display:block; }
@keyframes fadeSlideIn {
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== LOGIN PAGE ===== */
#login-page {
  min-height:100vh; display:none; align-items:center; justify-content:center;
  position:relative;
}
#login-page.active { display:flex; }
.login-card {
  background: linear-gradient(135deg, rgba(18,35,64,0.95) 0%, rgba(26,50,84,0.95) 100%);
  border:1px solid rgba(201,168,76,0.3);
  border-radius:20px; padding:48px 40px;
  width:420px; max-width:95vw;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.1);
  position:relative; overflow:hidden;
  animation: cardAppear 0.8s cubic-bezier(0.34,1.56,0.64,1) 2.2s both;
}
@keyframes cardAppear {
  from{opacity:0;transform:scale(0.8) translateY(30px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
.login-card::before {
  content:''; position:absolute; top:-50%; left:-50%;
  width:200%; height:200%;
  background: radial-gradient(circle at 60% 40%, rgba(201,168,76,0.05) 0%, transparent 60%);
  pointer-events:none;
}
.bank-logo {
  text-align:center; margin-bottom:32px;
}
.logo-icon {
  width:80px; height:80px; margin:0 auto 16px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  border-radius:20px; display:flex; align-items:center; justify-content:center;
  font-size:36px; box-shadow: 0 8px 32px rgba(201,168,76,0.3);
  position:relative; overflow:hidden;
}
.logo-icon::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2));
}
.bank-name {
  font-family:'Playfair Display', serif;
  font-size:26px; font-weight:900;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1.1;
}
.bank-tagline { font-size:11px; letter-spacing:3px; color:var(--text-muted); text-transform:uppercase; margin-top:4px; }

.login-tabs { display:flex; gap:8px; margin-bottom:28px; background:rgba(255,255,255,0.05); border-radius:10px; padding:4px; }
.tab-btn {
  flex:1; padding:10px; border:none; background:transparent;
  color:var(--text-muted); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
  border-radius:8px; cursor:pointer; transition:all 0.3s;
}
.tab-btn.active { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color:var(--navy); font-weight:700; }

.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:12px; font-weight:600; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; }
.form-group input {
  width:100%; padding:14px 16px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.2);
  border-radius:10px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:15px;
  transition:all 0.3s; outline:none;
}
.form-group input:focus { border-color:var(--gold); background:rgba(201,168,76,0.08); box-shadow:0 0 0 3px rgba(201,168,76,0.1); }
.form-group input::placeholder { color:var(--text-muted); }

.btn-primary {
  width:100%; padding:15px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  border:none; border-radius:10px;
  color:var(--navy); font-family:'DM Sans',sans-serif;
  font-size:15px; font-weight:700; letter-spacing:1px;
  cursor:pointer; transition:all 0.3s;
  box-shadow: 0 4px 20px rgba(201,168,76,0.3);
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(201,168,76,0.4); }
.btn-primary:active { transform:translateY(0); }

.error-msg { color:var(--red); font-size:13px; text-align:center; margin-top:12px; display:none; }
.success-msg { color:var(--green); font-size:13px; text-align:center; margin-top:12px; display:none; }

/* ===== DASHBOARD ===== */
#dashboard { min-height:100vh; }

/* SIDEBAR */
.sidebar {
  position:fixed; left:0; top:0; height:100vh; width:260px;
  background: linear-gradient(180deg, var(--navy-mid) 0%, var(--navy) 100%);
  border-right:1px solid rgba(201,168,76,0.15);
  z-index:100; display:flex; flex-direction:column;
  transition:transform 0.3s ease;
}
.sidebar-logo {
  padding:28px 24px; border-bottom:1px solid rgba(201,168,76,0.1);
  display:flex; align-items:center; gap:14px;
}
.sidebar-logo .logo-icon-sm {
  width:42px; height:42px; min-width:42px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px;
}
.sidebar-logo .bank-name-sm {
  font-family:'Playfair Display',serif; font-size:15px; font-weight:700;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1.2;
}

.sidebar-nav { flex:1; padding:16px 12px; overflow-y:auto; }
.nav-section-label {
  font-size:10px; font-weight:700; letter-spacing:2px;
  color:var(--text-muted); text-transform:uppercase;
  padding:12px 12px 6px;
}
.nav-item {
  display:flex; align-items:center; gap:12px; padding:12px 14px;
  border-radius:10px; cursor:pointer; transition:all 0.2s;
  color:var(--text-muted); font-size:14px; font-weight:500; margin-bottom:2px;
}
.nav-item:hover { background:rgba(201,168,76,0.08); color:var(--cream); }
.nav-item.active { background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08)); color:var(--gold); border-left:3px solid var(--gold); }
.nav-item .nav-icon { width:20px; text-align:center; font-size:16px; }
.nav-item .badge {
  margin-left:auto; background:var(--red); color:#fff;
  font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px;
}

.sidebar-footer {
  padding:16px 12px; border-top:1px solid rgba(201,168,76,0.1);
}
.user-info-bar {
  display:flex; align-items:center; gap:10px; padding:12px 14px;
  background:rgba(255,255,255,0.04); border-radius:10px; margin-bottom:8px;
}
.user-avatar {
  width:36px; height:36px; background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:15px; font-weight:700; color:var(--navy); flex-shrink:0;
}
.user-details .user-name { font-size:13px; font-weight:600; color:var(--cream); }
.user-details .user-role { font-size:11px; color:var(--gold); text-transform:uppercase; letter-spacing:1px; }
.btn-logout {
  width:100%; padding:10px; background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.2);
  border-radius:8px; color:var(--red); font-family:'DM Sans',sans-serif;
  font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s;
}
.btn-logout:hover { background:rgba(231,76,60,0.2); }

/* MAIN CONTENT */
.main-content {
  margin-left:260px; min-height:100vh;
  padding:32px; transition:margin 0.3s;
}

.page-header { margin-bottom:32px; }
.page-title {
  font-family:'Playfair Display',serif; font-size:32px; font-weight:900;
  background: linear-gradient(135deg, var(--cream), var(--gold-light));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.page-subtitle { color:var(--text-muted); font-size:14px; margin-top:4px; }

/* STAT CARDS */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:32px; }
.stat-card {
  background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
  border:1px solid rgba(201,168,76,0.15); border-radius:16px; padding:24px;
  position:relative; overflow:hidden; transition:transform 0.2s;
}
.stat-card:hover { transform:translateY(-3px); }
.stat-card::before {
  content:''; position:absolute; top:-20px; right:-20px;
  width:80px; height:80px; border-radius:50%;
  background: radial-gradient(circle, rgba(201,168,76,0.1) 0%, transparent 70%);
}
.stat-icon { font-size:28px; margin-bottom:12px; }
.stat-value {
  font-family:'Playfair Display',serif; font-size:28px; font-weight:700;
  color:var(--gold-light); line-height:1;
}
.stat-label { font-size:12px; color:var(--text-muted); margin-top:6px; text-transform:uppercase; letter-spacing:1px; }
.stat-change { font-size:12px; margin-top:8px; color:var(--green); }

/* TABLES */
.data-card {
  background: linear-gradient(135deg, var(--navy-mid), rgba(26,50,84,0.5));
  border:1px solid rgba(201,168,76,0.15); border-radius:16px;
  overflow:hidden; margin-bottom:24px;
}
.data-card-header {
  padding:20px 24px; border-bottom:1px solid rgba(201,168,76,0.1);
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.data-card-title { font-family:'Playfair Display',serif; font-size:18px; font-weight:700; color:var(--cream); }
.data-card-body { padding:0; overflow-x:auto; }

table { width:100%; border-collapse:collapse; }
th {
  padding:14px 20px; text-align:left;
  font-size:11px; font-weight:700; color:var(--gold); letter-spacing:1.5px; text-transform:uppercase;
  background:rgba(201,168,76,0.05); border-bottom:1px solid rgba(201,168,76,0.1);
}
td {
  padding:14px 20px; font-size:14px; color:var(--cream);
  border-bottom:1px solid rgba(255,255,255,0.04);
}
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(201,168,76,0.04); }

.badge-status {
  padding:4px 12px; border-radius:20px; font-size:11px; font-weight:700; text-transform:uppercase;
}
.badge-active { background:rgba(46,204,113,0.15); color:var(--green); }
.badge-pending { background:rgba(52,152,219,0.15); color:var(--blue-accent); }
.badge-overdue { background:rgba(231,76,60,0.15); color:var(--red); }
.badge-paid { background:rgba(46,204,113,0.15); color:var(--green); }

/* BUTTONS */
.btn-sm {
  padding:7px 16px; border-radius:8px; border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600;
  transition:all 0.2s; display:inline-flex; align-items:center; gap:6px;
}
.btn-gold { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
.btn-gold:hover { background:rgba(201,168,76,0.25); }
.btn-danger { background:rgba(231,76,60,0.15); color:var(--red); border:1px solid rgba(231,76,60,0.3); }
.btn-danger:hover { background:rgba(231,76,60,0.25); }
.btn-success { background:rgba(46,204,113,0.15); color:var(--green); border:1px solid rgba(46,204,113,0.3); }
.btn-success:hover { background:rgba(46,204,113,0.25); }
.btn-info { background:rgba(52,152,219,0.15); color:var(--blue-accent); border:1px solid rgba(52,152,219,0.3); }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:500;
  display:none; align-items:center; justify-content:center; padding:16px;
  backdrop-filter:blur(4px);
}
.modal-overlay.active { display:flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
  border:1px solid rgba(201,168,76,0.3); border-radius:20px;
  width:100%; max-width:500px; max-height:90vh; overflow-y:auto;
  animation: modalSlide 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalSlide { from{transform:scale(0.9) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
.modal-header {
  padding:24px 28px 16px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(201,168,76,0.1);
}
.modal-title { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--gold-light); }
.modal-close { background:none; border:none; color:var(--text-muted); font-size:24px; cursor:pointer; transition:color 0.2s; }
.modal-close:hover { color:var(--cream); }
.modal-body { padding:24px 28px; }
.modal-footer { padding:16px 28px 24px; display:flex; gap:12px; justify-content:flex-end; }

/* FORMS in modals */
.modal .form-group { margin-bottom:16px; }
.modal .form-group label { font-size:11px; font-weight:700; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; display:block; }
.modal .form-group input,
.modal .form-group select,
.modal .form-group textarea {
  width:100%; padding:12px 14px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.2);
  border-radius:10px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:14px;
  transition:all 0.3s; outline:none;
}
.modal .form-group input:focus,
.modal .form-group select:focus { border-color:var(--gold); background:rgba(201,168,76,0.08); }
.modal .form-group select option { background:var(--navy-mid); }
.modal .form-group textarea { resize:vertical; min-height:80px; }

/* TOAST */
#toast-container { position:fixed; bottom:24px; right:24px; z-index:9000; display:flex; flex-direction:column; gap:10px; }
.toast {
  padding:14px 20px; border-radius:12px; font-size:14px; font-weight:500;
  min-width:300px; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,0.4);
  animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1); display:flex; align-items:center; gap:10px;
}
@keyframes toastIn { from{opacity:0;transform:translateX(60px) scale(0.9)} to{opacity:1;transform:translateX(0) scale(1)} }
.toast.success { background:linear-gradient(135deg,#1a5c35,#1e7a42); color:#fff; border:1px solid rgba(46,204,113,0.4); }
.toast.error   { background:linear-gradient(135deg,#6b1a1a,#8b2020); color:#fff; border:1px solid rgba(231,76,60,0.4); }
.toast.info    { background:linear-gradient(135deg,#1a3a5c,#1a4a7a); color:#fff; border:1px solid rgba(52,152,219,0.4); }
.toast.warning { background:linear-gradient(135deg,#5c4a1a,#7a6020); color:#fff; border:1px solid rgba(241,196,15,0.4); }
.toast-icon { font-size:18px; flex-shrink:0; }
.toast-msg { flex:1; line-height:1.4; }

@keyframes shake {
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-8px)}
  30%{transform:translateX(8px)}
  45%{transform:translateX(-6px)}
  60%{transform:translateX(6px)}
  75%{transform:translateX(-3px)}
  90%{transform:translateX(3px)}
}

/* MOBILE TOGGLE */
.mobile-menu-btn {
  display:none; position:fixed; top:16px; left:16px; z-index:200;
  width:44px; height:44px; background:var(--navy-mid); border:1px solid rgba(201,168,76,0.3);
  border-radius:10px; align-items:center; justify-content:center; cursor:pointer; font-size:20px;
}

/* GRID 2COL */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

/* FORM ROW */
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

/* SEARCH */
.search-box {
  position:relative;
}
.search-box input {
  padding:10px 16px 10px 40px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.2);
  border-radius:10px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:14px;
  outline:none; transition:all 0.3s; width:240px;
}
.search-box input:focus { border-color:var(--gold); width:300px; }
.search-box::before {
  content:'🔍'; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:14px;
}

/* AMOUNT DISPLAY */
.amount-positive { color:var(--green); font-weight:600; }
.amount-negative { color:var(--red); font-weight:600; }
.amount-gold { color:var(--gold); font-weight:700; }

/* RESPONSIVE */
@media (max-width:768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main-content { margin-left:0; padding:16px; padding-top:70px; }
  .mobile-menu-btn { display:flex; }
  .grid-2 { grid-template-columns:1fr; }
  .form-row { grid-template-columns:1fr; }
  .stats-grid { grid-template-columns:1fr 1fr; }
}
@media (max-width:480px) {
  .stats-grid { grid-template-columns:1fr; }
}

/* GITHUB CONFIG */
.github-config-notice {
  background:rgba(52,152,219,0.1); border:1px solid rgba(52,152,219,0.3);
  border-radius:12px; padding:16px 20px; margin-bottom:24px;
  display:flex; align-items:flex-start; gap:12px; font-size:13px; color:var(--blue-accent);
}

/* PROFILE SECTION */
.profile-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }

/* ABOUT page */
.info-row { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.info-label { color:var(--text-muted); font-size:13px; }
.info-value { color:var(--cream); font-size:13px; font-weight:600; }

/* Animated number */
.animated-num { transition:all 0.5s ease; }

/* Share progress bar */
.share-bar { height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; margin-top:6px; }
.share-fill { height:100%; background: linear-gradient(90deg, var(--gold-dark), var(--gold-light)); border-radius:4px; transition:width 1s ease; }

/* OVERVIEW CHART */
.mini-chart { display:flex; align-items:flex-end; gap:4px; height:60px; }
.bar { flex:1; background: linear-gradient(0deg, var(--gold-dark), var(--gold-light)); border-radius:3px 3px 0 0; min-width:8px; opacity:0.7; transition:opacity 0.2s; }
.bar:hover { opacity:1; }

</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<!-- LOADER -->
<div id="loader">
  <div class="logo-anim">
    <div style="display:flex;flex-direction:column;align-items:center">
      <div class="logo-icon" style="width:100px;height:100px;font-size:48px;border-radius:24px;margin-bottom:16px">🏛️</div>
      <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:900;background:linear-gradient(135deg,#C9A84C,#E8C97A);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Dhelana Youth Bank</div>
      <div style="font-size:11px;letter-spacing:4px;color:#8A9BB0;text-transform:uppercase;margin-top:4px">Empowering Young India</div>
    </div>
  </div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <p>Loading Your Bank...</p>
</div>

<!-- APP -->
<div id="app">

  <!-- LOGIN PAGE -->
  <div id="login-page" class="section" style="display:flex">
    <div class="login-card">
      <div class="bank-logo">
        <div class="logo-icon">🏛️</div>
        <div class="bank-name">Dhelana Youth Bank</div>
        <div class="bank-tagline">Empowering Young India</div>
      </div>
      <div class="login-tabs">

const GITHUB_CONFIG = {

let DB = null;
let currentUser = null;

let activePage = 'overview';

// ============================================================
// PARTICLES
// ============================================================
(function(){
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<60;i++) particles.push({
    x:Math.random()*2000, y:Math.random()*1200,
    r:Math.random()*2+0.5,
    vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
    alpha:Math.random()*0.5+0.2
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x += p.vx; p.y += p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,168,76,${p.alpha})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ============================================================
// LOADER + FIRST-TIME TOKEN SETUP
// ============================================================

        <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#C9A84C,#E8C97A);-webkit-background-clip:text;-webkit-text-fill-color:transparent">GitHub Token Required</div>

      </div>

async function connectWithToken(){
  const input = document.getElementById('setup-token-input');
  const status = document.getElementById('setup-status');
  const token = input ? input.value.trim() : '';

  if(!token){
    if(status) status.innerHTML = '<span style="color:#E74C3C">⚠️ Please paste your token first</span>';
    return;
  }
  if(!token.startsWith('ghp_') && !token.startsWith('github_pat_')){
    if(status) status.innerHTML = '<span style="color:#E74C3C">⚠️ Token should start with ghp_ — check you copied it correctly</span>';
    return;
  }

  if(status) status.innerHTML = '<span style="color:#C9A84C">⏳ Verifying token with GitHub...</span>';

  try {
    const res = await fetch(
      `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}`,
      { headers:{ 'Authorization':`token ${token}` } }
    );

    if(res.ok){
      // Token works — save it
      GITHUB_CONFIG.token = token;
      localStorage.setItem('dhelana_github_config', JSON.stringify({
        token, owner:GITHUB_CONFIG.owner, repo:GITHUB_CONFIG.repo,
        branch:GITHUB_CONFIG.branch, path:GITHUB_CONFIG.path
      }));

      if(status) status.innerHTML = '<span style="color:#2ECC71">✅ Connected! Loading data from GitHub...</span>';

      // Reload DB from GitHub now that we have token
      DB._sha = null;
      await loadDB();
      updateGhLoginBadge();

      setTimeout(()=>{
        const overlay = document.getElementById('token-setup-overlay');
        if(overlay){ overlay.style.opacity='0'; overlay.style.transition='opacity 0.4s'; setTimeout(()=>overlay.remove(), 400); }
        toast('✅ GitHub connected! Data loaded successfully.', 'success', 5000);
      }, 1200);

    } else if(res.status === 401){
      if(status) status.innerHTML = '<span style="color:#E74C3C">❌ Token is invalid or expired. Generate a new one on GitHub.</span>';
    } else if(res.status === 404){
      if(status) status.innerHTML = `<span style="color:#E74C3C">❌ Repo "dhelana-bank-data" not found under nikul2004. Check repo name.</span>`;
    } else {
      if(status) status.innerHTML = `<span style="color:#E74C3C">❌ GitHub error ${res.status}. Try again.</span>`;
    }
  } catch(e){
    if(status) status.innerHTML = '<span style="color:#E74C3C">❌ Cannot reach GitHub. Check your internet connection.</span>';
  }
}

function skipTokenSetup(){
  const overlay = document.getElementById('token-setup-overlay');
  if(overlay){ overlay.style.opacity='0'; overlay.style.transition='opacity 0.3s'; setTimeout(()=>overlay.remove(), 300); }
  toast('ℹ️ Running in local mode — data will not sync across devices', 'info', 5000);

}

// DATA LAYER
// ============================================================
function defaultDB(){
  return {
    settings:{ bankName:'Dhelana Youth Bank', sharePrice:500, maxSharesPerUser:100, penaltyRate:2, interestRate:12, loanTenureMonths:12 },
    admins:[{ id:'ADMIN001', password:'admin123', name:'Bank Admin', createdAt:new Date().toISOString() }],
    users:[
      { id:'USR001', password:'pass123', name:'Arjun Patel', shares:10, balance:0, joinDate:'2025-01-01', phone:'9876543210', status:'active' },
      { id:'USR002', password:'pass456', name:'Priya Shah',  shares:5,  balance:0, joinDate:'2025-01-15', phone:'9876500001', status:'active' }
    ],
    transactions:[], loans:[], penalties:[], sharePayments:[], monthlyPayments:[]
  };
}

async function loadDB(){
  const def = defaultDB();
  if(GITHUB_CONFIG.token && GITHUB_CONFIG.owner && GITHUB_CONFIG.repo){
    try {
      const res = await fetch(
        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}?t=${Date.now()}`,
        { headers:{ 'Authorization':`token ${GITHUB_CONFIG.token}`, 'Accept':'application/vnd.github.v3+json', 'Cache-Control':'no-cache' } }
      );
      if(res.ok){
        const data = await res.json();
        let parsed = {};
        try{ parsed = JSON.parse(atob(data.content.replace(/\n/g,''))); }catch(e){ parsed={}; }
        if(!parsed.admins && !parsed.users){ DB = def; }
        else { DB = parsed; }
        DB._sha = data.sha;
        // If _tk is in the file, keep token fresh in localStorage for this device
        if(DB._tk){
          const tkDecoded = atob(DB._tk);
          if(tkDecoded && !GITHUB_CONFIG.token){
            GITHUB_CONFIG.token = tkDecoded;
            localStorage.setItem('dhelana_github_config', JSON.stringify({
              token:tkDecoded, owner:GITHUB_CONFIG.owner, repo:GITHUB_CONFIG.repo,
              branch:GITHUB_CONFIG.branch, path:GITHUB_CONFIG.path
            }));
          }
        }
        DB.settings = Object.assign({}, def.settings, DB.settings||{});
        if(!DB.admins||DB.admins.length===0) DB.admins=def.admins;
        if(!DB.users) DB.users=[];
        if(!DB.transactions) DB.transactions=[];
        if(!DB.loans) DB.loans=[];
        if(!DB.penalties) DB.penalties=[];
        if(!DB.sharePayments) DB.sharePayments=[];
        if(!DB.monthlyPayments) DB.monthlyPayments=[];
        console.log('✅ Loaded from GitHub. Users:', DB.users.length);
        return;
      } else { console.log('GitHub load failed:', res.status); }
    } catch(e){ console.log('GitHub load error:', e.message); }
  }
  // Fallback localStorage
  const saved = localStorage.getItem('dhelana_bank_db');
  DB = saved ? JSON.parse(saved) : def;
  DB.settings = Object.assign({}, def.settings, DB.settings||{});
  if(!DB.admins||DB.admins.length===0) DB.admins=def.admins;
  if(!DB.users) DB.users=[];
  if(!DB.transactions) DB.transactions=[];
  if(!DB.loans) DB.loans=[];
  if(!DB.penalties) DB.penalties=[];
  if(!DB.sharePayments) DB.sharePayments=[];
  if(!DB.monthlyPayments) DB.monthlyPayments=[];
  console.log('📦 Loaded from localStorage. Users:', DB.users.length);
}

async function saveDB(){
  const payload = {...DB};
  delete payload._sha;
  // Always keep encoded token in the data so new devices bootstrap automatically
  if(GITHUB_CONFIG.token) payload._tk = btoa(GITHUB_CONFIG.token);
  localStorage.setItem('dhelana_bank_db', JSON.stringify(payload));
  if(GITHUB_CONFIG.token && GITHUB_CONFIG.owner && GITHUB_CONFIG.repo){
    try {
      const getRes = await fetch(
        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}?t=${Date.now()}`,
        { headers:{ 'Authorization':`token ${GITHUB_CONFIG.token}`, 'Accept':'application/vnd.github.v3+json', 'Cache-Control':'no-cache' } }
      );
      let latestSha = DB._sha||null;
      if(getRes.ok){ const ex=await getRes.json(); latestSha=ex.sha; }
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
      const body = { message:`Bank update: ${new Date().toLocaleString('en-IN')}`, content, branch:GITHUB_CONFIG.branch||'main' };
      if(latestSha) body.sha = latestSha;
      const putRes = await fetch(
        `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`,
        { method:'PUT', headers:{ 'Authorization':`token ${GITHUB_CONFIG.token}`, 'Content-Type':'application/json', 'Accept':'application/vnd.github.v3+json' }, body:JSON.stringify(body) }
      );
      if(putRes.ok){
        const d=await putRes.json(); DB._sha=d.content.sha;
        toast('✅ Saved to GitHub','success'); return;
      } else {
        const err=await putRes.json(); console.error('Save error:',err);
        if(putRes.status===401) toast('❌ GitHub token invalid — re-enter in GitHub Config','error');
        else if(putRes.status===404) toast('❌ Repo not found — check GitHub Config','error');
        else toast(`❌ GitHub error ${putRes.status} — saved locally`,'error');
      }
    } catch(e){ console.error('saveDB exception:',e); toast('⚠️ GitHub unreachable — saved locally','info'); }
  }
  toast('💾 Saved locally','info');
}

function switchLoginTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>
    b.classList.toggle('active', (tab==='user'&&i===0)||(tab==='admin'&&i===1))
  );
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-userid').placeholder = tab==='admin' ? 'Enter Admin ID' : 'Enter your User ID';
}

function doLogin(){
  const id = document.getElementById('login-userid').value.trim();
  const pw = document.getElementById('login-password').value;

  // Clear previous error
  document.getElementById('login-error').style.display = 'none';

  // --- Validation ---
  if(!id && !pw){ showLoginError('Please enter your User ID and Password'); toast('⚠️ User ID and Password are required', 'error'); return; }
  if(!id){ showLoginError('Please enter your User ID'); toast('⚠️ User ID is required', 'error'); return; }
  if(!pw){ showLoginError('Please enter your Password'); toast('⚠️ Password is required', 'error'); return; }

  // --- DB not loaded yet ---
  if(!DB){ showLoginError('App is still loading. Please wait and try again.'); toast('⏳ Database not loaded yet — please wait', 'error'); return; }

  if(currentTab === 'admin'){
    // Check DB has admins array
    if(!DB.admins || DB.admins.length === 0){
      showLoginError('No admin accounts found. Database may not be loaded.');
      toast('❌ Admin accounts not found — check GitHub config', 'error');
      return;
    }
    // Find admin by ID only first
    const adminById = DB.admins.find(a => a.id === id);
    if(!adminById){
      showLoginError('Admin ID not found. Check your Admin ID.');
      toast(`❌ Admin ID "${id}" does not exist`, 'error');
      return;
    }
    // Check password
    if(adminById.password !== pw){
      showLoginError('Wrong password. Please try again.');
      toast('❌ Incorrect admin password', 'error');
      return;
    }
    currentUser = adminById;
    currentRole = 'admin';
    toast(`✅ Welcome back, ${adminById.name}!`, 'success');

  } else {
    // Check DB has users array
    if(!DB.users || DB.users.length === 0){
      showLoginError('No members found in the system.');
      toast('❌ No members registered yet', 'error');
      return;
    }
    // Find user by ID only first
    const userById = DB.users.find(u => u.id === id);
    if(!userById){
      showLoginError('User ID not found. Contact your bank admin.');
      toast(`❌ User ID "${id}" does not exist`, 'error');
      return;
    }
    // Check password
    if(userById.password !== pw){
      showLoginError('Wrong password. Please try again.');
      toast('❌ Incorrect password', 'error');
      return;
    }
    // Check status
    if(userById.status === 'inactive'){
      showLoginError('Your account is deactivated. Contact the bank admin.');
      toast('🔒 Account is deactivated — contact admin', 'error');
      return;
    }
    currentUser = userById;
    currentRole = 'user';
    toast(`✅ Welcome, ${userById.name}!`, 'success');
  }

  openDashboard();
}

function showLoginError(msg){
  const e = document.getElementById('login-error');
  e.textContent = '❌ ' + msg;
  e.style.display = 'block';
  // Shake animation
  const card = document.querySelector('.login-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'shake 0.4s ease';
}

function doLogout(){
  currentUser = null; currentRole = null;
  document.getElementById('login-userid').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').style.display = 'none';
  toast('👋 Logged out successfully', 'info');
  showSection('login-page');
}

      {id:'my-penalties',icon:'⚠️',label:'My Penalties'},
      {id:'my-transactions',icon:'💸',label:'Transaction History'},
    ]},
    { section:'ACCOUNT', items:[
      {id:'user-profile',icon:'👤',label:'My Profile'},
    ]}
  ];
  nav.innerHTML = items.map(section=>`
    <div class="nav-section-label">${section.section}</div>
    ${section.items.map(item=>`
      <div class="nav-item" id="nav-${item.id}" onclick="navigate('${item.id}')">
        <span class="nav-icon">${item.icon}</span> ${item.label}
      </div>
    `).join('')}
  `).join('');
}

function navigate(page){
  activePage = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  const mc = document.getElementById('main-content');
  mc.innerHTML = renderPage(page);
  initPage(page);
  // Close sidebar on mobile
  if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

function showSection(id){
  // Hide all sections explicitly
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
  // Show the target
  const el = document.getElementById(id);
  if(id === 'login-page') {
    el.style.display = 'flex';
  } else {
    el.style.display = 'block';
  }
}

// ============================================================
// PAGE RENDERERS
// ============================================================
function renderPage(page){
  switch(page){
    case 'overview': return currentRole==='admin' ? renderAdminOverview() : renderUserOverview();
    case 'users': return renderUsers();
    case 'add-user': return renderAddUser();
    case 'shares': return renderAdminShares();
    case 'loans': return renderAdminLoans();
    case 'penalties': return renderAdminPenalties();
    case 'transactions': return renderAdminTransactions();
    case 'monthly': return renderMonthlyPayments();
    case 'admin-settings': return renderAdminSettings();
    case 'admin-profile': return renderAdminProfile();
    case 'github-config': return renderGithubConfig();
    case 'my-shares': return renderUserShares();
    case 'my-loans': return renderUserLoans();
    case 'apply-loan': return renderApplyLoan();
    case 'my-penalties': return renderUserPenalties();
    case 'my-transactions': return renderUserTransactions();
    case 'user-profile': return renderUserProfile();
    default: return '<div class="page-header"><h1 class="page-title">Coming Soon</h1></div>';
  }
}

function initPage(page){
  // Animate stat numbers
  document.querySelectorAll('.animated-num').forEach(el=>{
    const target = parseFloat(el.dataset.target||0);
    let cur=0; const step = target/50;
    const iv = setInterval(()=>{
      cur = Math.min(cur+step, target);
      el.textContent = el.dataset.prefix + formatNum(Math.round(cur)) + (el.dataset.suffix||'');
      if(cur>=target) clearInterval(iv);
    },20);
  });
  // Animate share bars
  setTimeout(()=>{
    document.querySelectorAll('.share-fill').forEach(el=>{
      el.style.width = el.dataset.width+'%';
    });
  }, 100);
}

// ============================================================
// HELPERS
// ============================================================
function formatNum(n){ return n.toLocaleString('en-IN'); }
function formatCur(n){ return '₹'+formatNum(n); }
function today(){ return new Date().toISOString().split('T')[0]; }
function now(){ return new Date().toISOString(); }
function uuid(){ return 'ID'+Date.now().toString(36).toUpperCase(); }

function totalShares(userId){
  // Sum all share assignments
  const user = DB.users.find(u=>u.id===userId);
  return user ? (user.shares||0) : 0;
}
function userShareValue(userId){ return totalShares(userId) * DB.settings.sharePrice; }

function totalPenalty(userId){
  return DB.penalties.filter(p=>p.userId===userId&&p.status!=='paid').reduce((a,b)=>a+b.amount,0);
}
function totalLoanPending(userId){
  return DB.loans.filter(l=>l.userId===userId&&l.status==='active').reduce((a,b)=>a+(b.amount-b.paid),0);
}

function editUser(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u) return;
  openModal('Edit Member', `
    <div class="form-row">
      <div class="form-group"><label>Member ID</label><input id="eu-id" value="${u.id}" readonly style="opacity:0.6" /></div>
      <div class="form-group"><label>Full Name</label><input id="eu-name" value="${u.name}" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Phone</label><input id="eu-phone" value="${u.phone||''}" /></div>
      <div class="form-group"><label>Join Date</label><input type="date" id="eu-joindate" value="${u.joinDate||''}" /></div>
    </div>
    <div class="form-group"><label>New Password (leave blank to keep)</label><input type="password" id="eu-pw" placeholder="New password..." /></div>
  `, [
    { label:'Save Changes', cls:'btn-primary', action:`saveEditUser('${id}')` }
  ]);
}

function saveEditUser(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u){ toast('❌ Member not found', 'error'); return; }
  const name  = document.getElementById('eu-name').value.trim();
  const phone = document.getElementById('eu-phone').value.trim();
  const join  = document.getElementById('eu-joindate').value;
  const newPw = document.getElementById('eu-pw').value;
  if(!name){ toast('⚠️ Name cannot be empty', 'warning'); return; }
  if(phone && !/^\d{10}$/.test(phone)){ toast('⚠️ Phone must be 10 digits', 'warning'); return; }
  if(newPw && newPw.length < 4){ toast('⚠️ New password must be at least 4 characters', 'warning'); return; }
  u.name = name; u.phone = phone; u.joinDate = join;
  if(newPw){ u.password = newPw; toast('🔐 Password updated', 'info'); }
  saveDB(); closeModal(); navigate('users');
  toast(`✅ Member "${name}" updated`, 'success');
}

function setShares(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u) return;
  openModal(`Set Shares — ${u.name}`, `
    <div class="info-row"><span class="info-label">Current Shares</span><span class="info-value amount-gold">${u.shares||0}</span></div>
    <div class="info-row" style="margin-bottom:16px"><span class="info-label">Current Value</span><span class="info-value">${formatCur((u.shares||0)*DB.settings.sharePrice)}</span></div>
    <div class="form-group"><label>New Share Count</label><input type="number" id="ss-shares" value="${u.shares||0}" min="0" max="${DB.settings.maxSharesPerUser||100}" /></div>
    <div style="font-size:12px;color:var(--text-muted)">Share price: ${formatCur(DB.settings.sharePrice)} | Max: ${DB.settings.maxSharesPerUser||100} shares</div>
  `, [{ label:'Update Shares', cls:'btn-primary', action:`saveShares('${id}')` }]);
}

function saveShares(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u){ toast('❌ Member not found', 'error'); return; }
  const val = parseInt(document.getElementById('ss-shares').value);
  if(isNaN(val) || val < 0){ toast('⚠️ Shares must be 0 or more', 'warning'); return; }
  if(val > (DB.settings.maxSharesPerUser||100)){ toast(`⚠️ Max allowed shares is ${DB.settings.maxSharesPerUser||100}`, 'warning'); return; }
  const diff = val - (u.shares||0);
  u.shares = val;
  DB.transactions.push({ id:uuid(), userId:id, type: diff>=0?'credit':'debit', amount:Math.abs(diff)*DB.settings.sharePrice, note:`Share ${diff>=0?'increased':'decreased'} by ${Math.abs(diff)} → now ${val}`, date:now() });
  saveDB(); closeModal(); navigate('shares');
  toast(`✅ Shares updated to ${val} (${diff>=0?'+':''}${diff})`, 'success');
}

function toggleUser(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u){ toast('❌ Member not found', 'error'); return; }
  u.status = u.status==='active' ? 'inactive' : 'active';
  saveDB(); navigate('users');
  toast(u.status==='active' ? `✅ ${u.name} account activated` : `🔒 ${u.name} account deactivated`, u.status==='active'?'success':'warning');
}

function deleteUser(id){
  const u = DB.users.find(u=>u.id===id);
  if(!u){ toast('❌ Member not found', 'error'); return; }
  if(!confirm(`Remove member "${u.name}"? Their transaction history will be kept.`)) return;
  DB.users = DB.users.filter(u=>u.id!==id);
  saveDB(); navigate('users');
  toast(`🗑️ Member "${u.name}" removed`, 'info');
}

        <div class="form-group"><label>Full Name</label><input id="au-name" placeholder="Enter full name" /></div>
        <div class="form-group"><label>Phone Number</label><input id="au-phone" placeholder="10-digit mobile" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>User ID (login)</label><input id="au-id" placeholder="e.g. USR003" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="au-pw" placeholder="Set initial password" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Initial Shares</label><input type="number" id="au-shares" value="1" min="0" /></div>
        <div class="form-group"><label>Join Date</label><input type="date" id="au-join" value="${today()}" /></div>

      <button class="btn-primary" style="max-width:200px;margin-top:8px" onclick="addUser()">➕ Add Member</button>
    </div>
  </div>
  `;

function addUser(){
  const name   = document.getElementById('au-name').value.trim();
  const phone  = document.getElementById('au-phone').value.trim();
  const id     = document.getElementById('au-id').value.trim().toUpperCase();
  const pw     = document.getElementById('au-pw').value;
  const shares = parseInt(document.getElementById('au-shares').value)||0;
  const join   = document.getElementById('au-join').value;

  if(!name)  { toast('⚠️ Full name is required', 'error'); return; }
  if(!id)    { toast('⚠️ User ID is required', 'error'); return; }
  if(id.length < 3){ toast('⚠️ User ID must be at least 3 characters', 'warning'); return; }
  if(!pw)    { toast('⚠️ Password is required', 'error'); return; }
  if(pw.length < 4){ toast('⚠️ Password must be at least 4 characters', 'warning'); return; }
  if(phone && !/^\d{10}$/.test(phone)){ toast('⚠️ Phone must be 10 digits', 'warning'); return; }
  if(DB.users.find(u=>u.id===id)){ toast(`❌ User ID "${id}" already exists`, 'error'); return; }
  if(DB.admins.find(a=>a.id===id)){ toast(`❌ ID "${id}" is already used by an admin`, 'error'); return; }
  if(shares < 0){ toast('⚠️ Shares cannot be negative', 'warning'); return; }
  if(shares > (DB.settings.maxSharesPerUser||100)){ toast(`⚠️ Max allowed shares is ${DB.settings.maxSharesPerUser||100}`, 'warning'); return; }

  DB.users.push({ id, password:pw, name, phone, shares, joinDate:join, status:'active' });
  if(shares>0) DB.transactions.push({ id:uuid(), userId:id, type:'credit', amount:shares*DB.settings.sharePrice, note:`Initial share purchase: ${shares} shares`, date:now() });
  saveDB(); navigate('users');
  toast(`✅ Member "${name}" added successfully!`, 'success');
}

  openModal('Issue New Loan', `

        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Total Payable</div><div id="nl-total" style="font-size:18px;font-weight:700;color:var(--cream)">—</div></div>

function previewLoanAdmin(){
  const amount = parseFloat(document.getElementById('nl-amount')?.value)||0;
  const months = parseInt(document.getElementById('nl-tenure')?.value)||1;
  const annualRate = parseFloat(document.getElementById('nl-rate')?.value)||0;
  const preview = document.getElementById('nl-preview');
  if(!preview) return;
  if(!amount){ preview.style.display='none'; return; }
  preview.style.display='block';
  const r = annualRate / 12 / 100;
  let emi, totalPayable, totalInterest;
  if(r===0){ emi=amount/months; totalPayable=amount; totalInterest=0; }
  else { emi=amount*r*Math.pow(1+r,months)/(Math.pow(1+r,months)-1); totalPayable=emi*months; totalInterest=totalPayable-amount; }
  document.getElementById('nl-emi').textContent = formatCur(Math.ceil(emi));
  document.getElementById('nl-interest').textContent = formatCur(Math.round(totalInterest));
  document.getElementById('nl-total').textContent = formatCur(Math.round(totalPayable));
}

function saveLoan(){
  const userId     = document.getElementById('nl-user').value;
  const amount     = parseFloat(document.getElementById('nl-amount').value)||0;
  const months     = parseInt(document.getElementById('nl-tenure').value)||0;
  const annualRate = parseFloat(document.getElementById('nl-rate').value)||0;
  const date       = document.getElementById('nl-date').value;
  const desc       = document.getElementById('nl-desc').value.trim();
  if(!amount || amount <= 0)  { toast('⚠️ Enter a valid loan amount', 'warning'); return; }
  if(!months || months <= 0)  { toast('⚠️ Tenure must be at least 1 month', 'warning'); return; }
  if(annualRate < 0)           { toast('⚠️ Interest rate cannot be negative', 'warning'); return; }
  if(!date)                    { toast('⚠️ Issue date is required', 'warning'); return; }
  if(!desc)                    { toast('⚠️ Loan purpose/description is required', 'warning'); return; }
  const u = DB.users.find(u=>u.id===userId);
  const r   = annualRate / 12 / 100;
  const emi = r===0 ? Math.ceil(amount/months) : Math.ceil(amount*r*Math.pow(1+r,months)/(Math.pow(1+r,months)-1));
  const totalPayable = emi * months;
  const loanId = 'LN'+Date.now().toString(36).toUpperCase();
  DB.loans.push({ id:loanId, userId, amount, paid:0, date:date+'T00:00:00', status:'active', desc, tenure:months, emi, totalPayable, interestRate:annualRate });
  DB.transactions.push({ id:uuid(), userId, type:'debit', amount, note:`Loan issued: ${loanId}. ${desc}`, date:date+'T00:00:00' });
  saveDB(); closeModal(); navigate('loans');
  toast(`✅ Loan of ₹${amount.toLocaleString('en-IN')} issued to ${u?.name||userId}. EMI: ₹${emi.toLocaleString('en-IN')}/month`, 'success', 5000);
}

    <div class="info-row"><span class="info-label">Amount Paid</span><span class="info-value amount-positive">${formatCur(l.paid)}</span></div>
    <div class="info-row"><span class="info-label">Balance</span><span class="info-value ${bal>0?'amount-negative':'amount-positive'}">${formatCur(bal)}</span></div>
    <div class="info-row"><span class="info-label">Purpose</span><span class="info-value" style="color:var(--text-muted)">${l.desc||'—'}</span></div>
    <div class="info-row"><span class="info-label">Issued On</span><span class="info-value">${l.date?.split('T')[0]}</span></div>
    <div style="margin-top:16px">
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:6px">Repayment Progress</div>
      <div style="height:10px;background:rgba(255,255,255,0.08);border-radius:5px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold-dark),var(--green));border-radius:5px;transition:width 1s"></div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${pct.toFixed(1)}% repaid</div>
    </div>
  `, [{ label:'💵 Record Payment', cls:'btn-primary', action:`closeModal();recordLoanPayment('${loanId}')` }]);
}

function recordLoanPayment(loanId){
  const loan = DB.loans.find(l=>l.id===loanId);
  if(!loan) return;
  const bal = loan.amount - loan.paid;
  openModal('Record Loan Payment', `
    <div class="info-row"><span class="info-label">Loan ID</span><span class="info-value amount-gold">${loanId}</span></div>
    <div class="info-row"><span class="info-label">Outstanding</span><span class="info-value amount-negative">${formatCur(bal)}</span></div>
    <div class="form-group" style="margin-top:16px"><label>Payment Amount (₹)</label><input type="number" id="lp-amount" placeholder="Amount paid" max="${bal}" /></div>
    <div class="form-group"><label>Payment Date</label><input type="date" id="lp-date" value="${today()}" /></div>
  `, [{ label:'Record Payment', cls:'btn-primary', action:`saveLoanPayment('${loanId}')` }]);
}

function saveLoanPayment(loanId){
  const loan = DB.loans.find(l=>l.id===loanId);
  if(!loan){ toast('❌ Loan not found', 'error'); return; }
  const amt  = parseFloat(document.getElementById('lp-amount').value)||0;
  const date = document.getElementById('lp-date').value;
  const bal  = loan.amount - loan.paid;
  if(!amt || amt <= 0){ toast('⚠️ Enter a valid payment amount', 'warning'); return; }
  if(amt > bal){ toast(`⚠️ Amount exceeds balance of ₹${bal.toLocaleString('en-IN')}`, 'warning'); return; }
  if(!date){ toast('⚠️ Payment date is required', 'warning'); return; }
  loan.paid += amt;
  if(loan.paid >= loan.amount){ loan.paid = loan.amount; loan.status = 'closed'; toast('🎉 Loan fully repaid and closed!', 'success'); }
  else { toast(`✅ Payment of ₹${amt.toLocaleString('en-IN')} recorded. Balance: ₹${(loan.amount-loan.paid).toLocaleString('en-IN')}`, 'success'); }
  DB.transactions.push({ id:uuid(), userId:loan.userId, type:'credit', amount:amt, note:`Loan repayment: ${loanId}`, date:date+'T00:00:00' });
  saveDB(); closeModal(); navigate('loans');
}

function addPenalty(){
  openModal('Add Penalty', `

    <div class="form-group"><label>Reason</label><input id="ap-reason" placeholder="Reason for penalty..." /></div>
  `, [{ label:'Add Penalty', cls:'btn-primary', action:'savePenalty()' }]);

function savePenalty(){
  const userId = document.getElementById('ap-user').value;
  const amount = parseFloat(document.getElementById('ap-amount').value)||0;
  const date   = document.getElementById('ap-date').value;
  const reason = document.getElementById('ap-reason').value.trim();
  if(!amount || amount <= 0){ toast('⚠️ Enter a valid penalty amount', 'warning'); return; }
  if(!reason){ toast('⚠️ Penalty reason is required', 'warning'); return; }
  if(!date){ toast('⚠️ Date is required', 'warning'); return; }
  const u = DB.users.find(u=>u.id===userId);
  DB.penalties.push({ id:uuid(), userId, amount, date:date+'T00:00:00', reason, status:'pending' });
  DB.transactions.push({ id:uuid(), userId, type:'debit', amount, note:`Penalty: ${reason}`, date:date+'T00:00:00' });
  saveDB(); closeModal(); navigate('penalties');
  toast(`⚠️ Penalty of ₹${amount} added for ${u?.name||userId}`, 'warning');
}

function markPenaltyPaid(id){
  const p = DB.penalties.find(p=>p.id===id);
  if(!p){ toast('❌ Penalty record not found', 'error'); return; }
  if(p.status==='paid'){ toast('ℹ️ This penalty is already paid', 'info'); return; }
  p.status = 'paid';
  const u = DB.users.find(u=>u.id===p.userId);
  DB.transactions.push({ id:uuid(), userId:p.userId, type:'credit', amount:p.amount, note:`Penalty paid: ${p.reason}`, date:now() });
  saveDB(); navigate('penalties');
  toast(`✅ Penalty of ₹${p.amount.toLocaleString('en-IN')} marked as paid for ${u?.name||p.userId}`, 'success');
}

function deletePenalty(id){
  const p = DB.penalties.find(x=>x.id===id);
  if(!p){ toast('❌ Penalty not found', 'error'); return; }
  if(!confirm(`Delete penalty of ₹${p.amount} — "${p.reason}"?`)) return;
  DB.penalties = DB.penalties.filter(x=>x.id!==id);
  saveDB(); navigate('penalties');
  toast('🗑️ Penalty deleted', 'info');
}

function addMonthlyPayment(){
  openModal('Record Monthly Payment', `
    <div class="form-group"><label>Select Member</label><select id="mp-user">
      ${DB.users.map(u=>`<option value="${u.id}">${u.name} (${u.id})</option>`).join('')}
    </select></div>
    <div class="form-row">
      <div class="form-group"><label>Month (YYYY-MM)</label><input type="month" id="mp-month" value="${new Date().toISOString().slice(0,7)}" /></div>
      <div class="form-group"><label>Amount (₹)</label><input type="number" id="mp-amount" value="${DB.settings.sharePrice}" /></div>
    </div>
    <div class="form-group"><label>Status</label><select id="mp-status"><option value="paid">Paid</option><option value="pending">Pending</option></select></div>
  `, [{ label:'Record', cls:'btn-primary', action:'saveMonthlyPayment()' }]);
}

function saveMonthlyPayment(){
  const userId = document.getElementById('mp-user').value;
  const month  = document.getElementById('mp-month').value;
  const amount = parseFloat(document.getElementById('mp-amount').value)||0;
  const status = document.getElementById('mp-status').value;
  if(!month)            { toast('⚠️ Please select a month', 'warning'); return; }
  if(!amount || amount <= 0){ toast('⚠️ Enter a valid amount', 'warning'); return; }
  const existing = DB.monthlyPayments.find(m=>m.userId===userId && m.month===month);
  if(existing)          { toast(`⚠️ Payment for ${month} already recorded for this member`, 'warning'); return; }
  const u = DB.users.find(u=>u.id===userId);
  DB.monthlyPayments.push({ id:uuid(), userId, month, amount, status, paidDate:status==='paid'?today():null });
  if(status==='paid') DB.transactions.push({ id:uuid(), userId, type:'credit', amount, note:`Monthly payment: ${month}`, date:now() });
  saveDB(); closeModal(); navigate('monthly');
  toast(`✅ Monthly payment for ${month} recorded for ${u?.name||userId}`, 'success');
}

function markMonthlyPaid(id){
  const mp = DB.monthlyPayments.find(m=>m.id===id);
  if(!mp){ toast('❌ Payment record not found', 'error'); return; }
  if(mp.status==='paid'){ toast('ℹ️ Already marked as paid', 'info'); return; }
  mp.status='paid'; mp.paidDate=today();
  const u = DB.users.find(u=>u.id===mp.userId);
  DB.transactions.push({ id:uuid(), userId:mp.userId, type:'credit', amount:mp.amount, note:`Monthly payment: ${mp.month}`, date:now() });
  saveDB(); navigate('monthly');
  toast(`✅ Monthly payment for ${mp.month} marked as paid for ${u?.name||mp.userId}`, 'success');
}

function saveSettings(){
  const sharePrice   = parseFloat(document.getElementById('set-shareprice').value)||0;
  const maxShares    = parseInt(document.getElementById('set-maxshares').value)||0;
  const penaltyRate  = parseFloat(document.getElementById('set-penalty').value);
  const bankName     = document.getElementById('set-bankname').value.trim();
  const interestRate = parseFloat(document.getElementById('set-interest').value);
  const tenure       = parseInt(document.getElementById('set-tenure').value)||0;
  if(!sharePrice || sharePrice <= 0)   { toast('⚠️ Share price must be greater than ₹0', 'warning'); return; }
  if(!maxShares  || maxShares  <= 0)   { toast('⚠️ Max shares must be greater than 0', 'warning'); return; }
  if(isNaN(penaltyRate) || penaltyRate < 0){ toast('⚠️ Penalty rate cannot be negative', 'warning'); return; }
  if(!bankName)                         { toast('⚠️ Bank name cannot be empty', 'warning'); return; }
  if(isNaN(interestRate) || interestRate < 0){ toast('⚠️ Interest rate cannot be negative', 'warning'); return; }
  if(interestRate > 100)                { toast('⚠️ Interest rate seems too high (max 100%)', 'warning'); return; }
  if(!tenure || tenure <= 0)            { toast('⚠️ Default tenure must be at least 1 month', 'warning'); return; }
  DB.settings.sharePrice       = sharePrice;
  DB.settings.maxSharesPerUser = maxShares;
  DB.settings.penaltyRate      = penaltyRate;
  DB.settings.bankName         = bankName;
  DB.settings.interestRate     = interestRate;
  DB.settings.loanTenureMonths = tenure;
  saveDB();
  toast('✅ Bank settings saved successfully', 'success');
}

function saveAdmin(){
  const id   = document.getElementById('aa-id').value.trim().toUpperCase();
  const name = document.getElementById('aa-name').value.trim();
  const pw   = document.getElementById('aa-pw').value;
  if(!id)  { toast('⚠️ Admin ID is required', 'warning'); return; }
  if(!name){ toast('⚠️ Admin name is required', 'warning'); return; }
  if(!pw)  { toast('⚠️ Password is required', 'warning'); return; }
  if(pw.length < 4){ toast('⚠️ Password must be at least 4 characters', 'warning'); return; }
  if(DB.admins.find(a=>a.id===id)){ toast(`❌ Admin ID "${id}" already exists`, 'error'); return; }
  if(DB.users.find(u=>u.id===id)) { toast(`❌ ID "${id}" already used by a member`, 'error'); return; }
  DB.admins.push({ id, name, password:pw, createdAt:now() });
  saveDB(); closeModal(); navigate('admin-settings');
  toast(`✅ Admin "${name}" created successfully`, 'success');
}

function deleteAdmin(id){
  if(id === currentUser.id){ toast('❌ You cannot delete your own admin account', 'error'); return; }
  if(DB.admins.length <= 1){ toast('❌ Cannot delete the only admin account', 'error'); return; }
  const a = DB.admins.find(x=>x.id===id);
  if(!a){ toast('❌ Admin not found', 'error'); return; }
  if(!confirm(`Remove admin "${a.name}" (${a.id})?`)) return;
  DB.admins = DB.admins.filter(x=>x.id!==id);
  saveDB(); navigate('admin-settings');
  toast(`🗑️ Admin "${a.name}" removed`, 'info');
}

function saveGithubConfig(){
  const token  = document.getElementById('gh-token').value.trim();
  const owner  = document.getElementById('gh-owner').value.trim();
  const repo   = document.getElementById('gh-repo').value.trim();
  const branch = document.getElementById('gh-branch').value.trim()||'main';
  const path   = document.getElementById('gh-path').value.trim()||'bank-data.json';

  if(!token){ toast('⚠️ Token is required', 'warning'); return; }
  if(!owner){ toast('⚠️ GitHub username is required', 'warning'); return; }
  if(!repo) { toast('⚠️ Repository name is required', 'warning'); return; }

  GITHUB_CONFIG.token  = token;
  GITHUB_CONFIG.owner  = owner;
  GITHUB_CONFIG.repo   = repo;
  GITHUB_CONFIG.branch = branch;
  GITHUB_CONFIG.path   = path;

  // Also save to localStorage as session backup
  localStorage.setItem('dhelana_github_config', JSON.stringify({ token, owner, repo, branch, path }));

async function verifyGithubLive(){
  const el = document.getElementById('gh-verify-result');
  if(!el) return;
  if(!GITHUB_CONFIG.token){ el.innerHTML='<span style="color:var(--red)">❌ No token set</span>'; return; }
  el.innerHTML = '<span style="color:var(--gold)">⏳ Checking...</span>';
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}`,
      { headers:{ 'Authorization':`token ${GITHUB_CONFIG.token}` } });
    if(res.ok){
      const data = await res.json();
      el.innerHTML = `<span style="color:var(--green)">✅ Connected! Repo: <strong>${data.full_name}</strong> | Visibility: ${data.private?'🔒 Private':'🌐 Public'}</span>`;
    } else {
      const err = await res.json();
      el.innerHTML = `<span style="color:var(--red)">❌ Error ${res.status}: ${err.message}</span>`;
    }
  } catch(e){ el.innerHTML='<span style="color:var(--red)">❌ Network error — check your internet</span>'; }
}

async function testGithubConnection(){
  const status = document.getElementById('gh-status');
  status.innerHTML = '<span style="color:var(--gold)">⏳ Testing connection...</span>';
  const token = document.getElementById('gh-token').value.trim();
  const owner = document.getElementById('gh-owner').value.trim();
  const repo  = document.getElementById('gh-repo').value.trim();
  if(!token||!owner||!repo){ status.innerHTML='<span style="color:var(--red)">❌ Fill in token, username and repo first</span>'; return; }
  try {
    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}`,
      { headers:{ 'Authorization':`token ${token}` } });
    if(res.ok){
      const d = await res.json();
      status.innerHTML = `<span style="color:var(--green)">✅ Connection successful!<br>Repo: <strong>${d.full_name}</strong> | ${d.private?'🔒 Private':'🌐 Public'} | Default branch: ${d.default_branch}</span>`;
      toast('✅ GitHub connected successfully!', 'success');
    } else {
      const err = await res.json();
      if(res.status===401) status.innerHTML='<span style="color:var(--red)">❌ Token invalid or expired. Generate a new one.</span>';
      else if(res.status===404) status.innerHTML='<span style="color:var(--red)">❌ Repo not found. Check username and repo name.</span>';
      else status.innerHTML=`<span style="color:var(--red)">❌ Error ${res.status}: ${err.message}</span>`;
      toast(`❌ GitHub connection failed (${res.status})`, 'error');
    }
  } catch(e){
    status.innerHTML='<span style="color:var(--red)">❌ Network error. Check your internet connection.</span>';
    toast('❌ Cannot reach GitHub — check internet', 'error');
  }
}

// ============================================================
// DOWNLOAD HTML WITH TOKEN BAKED IN
// This is the KEY function — it generates a new HTML file
// with the GitHub token hardcoded so ANY device can use it.
// ============================================================
async function downloadHtmlWithToken(){
  const token  = document.getElementById('gh-token')?.value.trim() || GITHUB_CONFIG.token;
  const owner  = document.getElementById('gh-owner')?.value.trim() || GITHUB_CONFIG.owner;
  const repo   = document.getElementById('gh-repo')?.value.trim()  || GITHUB_CONFIG.repo;
  const branch = document.getElementById('gh-branch')?.value.trim()|| GITHUB_CONFIG.branch || 'main';
  const path   = document.getElementById('gh-path')?.value.trim()  || GITHUB_CONFIG.path   || 'bank-data.json';

  if(!token){ toast('⚠️ Enter your GitHub token first', 'warning'); return; }
  if(!owner){ toast('⚠️ Enter your GitHub username first', 'warning'); return; }
  if(!repo) { toast('⚠️ Enter your repository name first', 'warning'); return; }

  toast('⏳ Generating HTML file with token...', 'info');

  // Read this page's own HTML source
  try {
    const res = await fetch(window.location.href);
    let html = await res.text();

    // Replace the GITHUB_CONFIG block with hardcoded values
    html = html.replace(
      /const GITHUB_CONFIG = \{[\s\S]*?\};/,
      `const GITHUB_CONFIG = {\n  token:  '${token}',\n  owner:  '${owner}',\n  repo:   '${repo}',\n  path:   '${path}',\n  branch: '${branch}'\n};`
    );

    const blob = new Blob([html], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'Dhelana Youth Bank.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('✅ Downloaded! Upload this file to GitHub Pages — it works on ALL devices.', 'success', 7000);
  } catch(e){
    // Fallback: if fetch(self) fails (e.g. file:// protocol), generate from current document
    let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    html = html.replace(
      /token:\s*'[^']*'/,
      `token:  '${token}'`
    ).replace(
      /owner:\s*'[^']*'/,
      `owner:  '${owner}'`
    ).replace(
      /repo:\s*'[^']*'/,
      `repo:   '${repo}'`
    ).replace(
      /branch:\s*'[^']*'/,
      `branch: '${branch}'`
    );
    const blob = new Blob([html], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'Dhelana Youth Bank.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('✅ Downloaded! Use this file on all devices.', 'success', 6000);
  }
}

function calcLoanPreview(){
  const principal = parseFloat(document.getElementById('la-amount').value)||0;
  const months = parseInt(document.getElementById('la-tenure').value)||1;
  const annualRate = DB.settings.interestRate || 12;
  const r = annualRate / 12 / 100; // monthly rate

  if(principal <= 0){ 
    document.getElementById('loan-calc-result').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px 0;font-size:14px">Enter loan amount and tenure to see the repayment breakdown</div>';
    document.getElementById('emi-schedule-card').style.display='none';
    return;
  }

  // EMI formula: P * r * (1+r)^n / ((1+r)^n - 1)
  let emi, totalPayable, totalInterest;
  if(r === 0){
    emi = principal / months;
    totalPayable = principal;
    totalInterest = 0;
  } else {
    emi = principal * r * Math.pow(1+r, months) / (Math.pow(1+r, months) - 1);
    totalPayable = emi * months;
    totalInterest = totalPayable - principal;
  }

  document.getElementById('loan-calc-result').innerHTML = `
    <div class="highlight-box">
      <div class="big-num">${formatCur(Math.ceil(emi))}</div>
      <div class="big-label">Monthly EMI</div>
    </div>
    <div class="calc-row"><span class="calc-label">Loan Amount</span><span class="calc-value amount-gold">${formatCur(principal)}</span></div>
    <div class="calc-row"><span class="calc-label">Interest Rate</span><span class="calc-value">${annualRate}% per annum</span></div>
    <div class="calc-row"><span class="calc-label">Tenure</span><span class="calc-value">${months} months</span></div>
    <div class="calc-row"><span class="calc-label">Total Interest</span><span class="calc-value amount-negative">${formatCur(Math.round(totalInterest))}</span></div>
    <div class="calc-row" style="border-top:1px solid rgba(201,168,76,0.2);margin-top:4px;padding-top:16px">
      <span class="calc-label" style="font-weight:700;color:var(--cream)">Total Amount Payable</span>
      <span class="calc-value" style="color:var(--gold);font-size:18px">${formatCur(Math.round(totalPayable))}</span>
    </div>
  `;

  // Build schedule
  let balance = principal;
  let rows = '';
  const startDate = new Date();
  for(let m=1; m<=Math.min(months,36); m++){
    const interestForMonth = balance * r;
    const principalForMonth = emi - interestForMonth;
    balance -= principalForMonth;
    if(balance < 0) balance = 0;
    const dueDate = new Date(startDate);
    dueDate.setMonth(dueDate.getMonth() + m);
    rows += `<tr>
      <td style="color:var(--text-muted)">${m}</td>
      <td style="color:var(--text-muted)">${dueDate.toLocaleDateString('en-IN',{month:'short',year:'numeric'})}</td>
      <td class="amount-gold">${formatCur(Math.ceil(emi))}</td>
      <td class="amount-positive">${formatCur(Math.round(principalForMonth))}</td>
      <td class="amount-negative">${formatCur(Math.round(interestForMonth))}</td>
      <td style="color:${balance<1?'var(--green)':'var(--cream)'}">${formatCur(Math.max(0,Math.round(balance)))}</td>
    </tr>`;
  }
  if(months > 36) rows += `<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:12px">... and ${months-36} more months</td></tr>`;

  document.getElementById('emi-schedule-card').style.display='block';
  document.getElementById('emi-schedule-body').innerHTML = `
    <table>
      <thead><tr><th>#</th><th>Due Month</th><th>EMI</th><th>Principal</th><th>Interest</th><th>Balance</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function submitLoanApplication(){
  const amount  = parseFloat(document.getElementById('la-amount').value)||0;
  const tenure  = parseInt(document.getElementById('la-tenure').value)||0;
  const purpose = document.getElementById('la-purpose').value.trim();
  if(!amount || amount <= 0){ toast('⚠️ Enter a valid loan amount', 'warning'); return; }
  if(amount < 500){ toast('⚠️ Minimum loan amount is ₹500', 'warning'); return; }
  if(!tenure || tenure < 1){ toast('⚠️ Tenure must be at least 1 month', 'warning'); return; }
  if(tenure > 120){ toast('⚠️ Maximum tenure is 120 months (10 years)', 'warning'); return; }
  if(!purpose){ toast('⚠️ Please describe the purpose of your loan', 'warning'); return; }
  if(purpose.length < 10){ toast('⚠️ Please describe purpose in at least 10 characters', 'warning'); return; }

  // Check existing active loans
  const activeLoans = DB.loans.filter(l=>l.userId===currentUser.id&&l.status==='active');
  if(activeLoans.length >= 3){ toast('❌ You already have 3 active loans. Repay one before applying again', 'error'); return; }

  const annualRate = DB.settings.interestRate || 12;
  const r = annualRate / 12 / 100;
  const emi = r > 0
    ? Math.ceil(amount * r * Math.pow(1+r, tenure) / (Math.pow(1+r, tenure) - 1))
    : Math.ceil(amount / tenure);
  const totalPayable = emi * tenure;
  const loanId = 'LN'+Date.now().toString(36).toUpperCase();
  DB.loans.push({ id:loanId, userId:currentUser.id, amount, paid:0, date:now(), status:'active', desc:purpose, tenure, emi, totalPayable, interestRate:annualRate, appliedByUser:true });
  DB.transactions.push({ id:uuid(), userId:currentUser.id, type:'debit', amount, note:`Loan applied: ${loanId}. ${purpose}`, date:now() });
  saveDB();
  toast(`✅ Loan of ₹${amount.toLocaleString('en-IN')} applied! EMI: ₹${emi.toLocaleString('en-IN')}/month`, 'success', 5000);
  navigate('my-loans');
}

      <div style="display:flex;align-items:center;gap:20px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.06)">
        <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--gold-dark),var(--gold-light));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--navy)">${u.name[0]}</div>
        <div><div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700">${u.name}</div><div style="color:var(--gold);font-size:13px">${u.id}</div></div>
      </div>
      <div class="form-group"><label>Full Name</label><input id="up-name" value="${u.name}" /></div>
      <div class="form-group"><label>Phone</label><input id="up-phone" value="${u.phone||''}" /></div>
      <div class="form-group"><label>New User ID (leave blank to keep)</label><input id="up-newid" placeholder="New login ID..." /></div>
      <div class="form-group"><label>Current Password (required to change password)</label><input type="password" id="up-curpw" placeholder="Current password..." /></div>
      <div class="form-group"><label>New Password (leave blank to keep)</label><input type="password" id="up-newpw" placeholder="New password..." /></div>
      <button class="btn-primary" style="max-width:200px;margin-top:8px" onclick="saveUserProfile()">💾 Update Profile</button>
    </div>
  </div>
  `;
}

function saveUserProfile(){
  const user  = DB.users.find(u=>u.id===currentUser.id);
  if(!user){ toast('❌ User account not found', 'error'); return; }
  const name  = document.getElementById('up-name').value.trim();
  const phone = document.getElementById('up-phone').value.trim();
  const newId = document.getElementById('up-newid').value.trim().toUpperCase();
  const curPw = document.getElementById('up-curpw').value;
  const newPw = document.getElementById('up-newpw').value;
  if(!name){ toast('⚠️ Name cannot be empty', 'warning'); return; }
  if(phone && !/^\d{10}$/.test(phone)){ toast('⚠️ Phone must be 10 digits', 'warning'); return; }
  if(newId){
    if(newId.length < 3){ toast('⚠️ New ID must be at least 3 characters', 'warning'); return; }
    if(DB.users.find(u=>u.id===newId&&u.id!==currentUser.id)){ toast(`❌ User ID "${newId}" is already taken`, 'error'); return; }
    if(DB.admins.find(a=>a.id===newId)){ toast(`❌ ID "${newId}" is reserved for admin`, 'error'); return; }
    user.id = newId;
    toast(`✅ Login ID changed to "${newId}"`, 'info');
  }
  if(newPw){
    if(!curPw){ toast('⚠️ Enter your current password to change it', 'warning'); return; }
    if(curPw !== user.password){ toast('❌ Current password is incorrect', 'error'); return; }
    if(newPw.length < 4){ toast('⚠️ New password must be at least 4 characters', 'warning'); return; }
    if(newPw === curPw){ toast('⚠️ New password must be different from current', 'warning'); return; }
    user.password = newPw;
    toast('🔐 Password changed successfully', 'info');
  }
  user.name = name;
  user.phone = phone;
  currentUser = user;
  document.getElementById('sidebar-username').textContent = user.name;
  document.getElementById('sidebar-avatar').textContent = user.name[0];
  saveDB(); toast('✅ Profile updated successfully', 'success');
}

// ============================================================
// MODAL
// ============================================================
function openModal(title, body, buttons=[]){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn-sm btn-danger" onclick="closeModal()">✕ Cancel</button>
    ${buttons.map(b=>`<button class="btn-sm btn-primary" style="padding:10px 24px;font-size:14px" onclick="${b.action}">${b.label}</button>`).join('')}
  `;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('active'); }
document.getElementById('modal-overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ============================================================
// TOAST NOTIFICATION SYSTEM
// ============================================================
function toast(msg, type='info', duration=3500){
  const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span class="toast-msg">${msg}</span>`;

  // Click to dismiss
  el.style.cursor = 'pointer';
  el.addEventListener('click', ()=>dismissToast(el));

  document.getElementById('toast-container').appendChild(el);

  // Auto dismiss
  const timer = setTimeout(()=>dismissToast(el), duration);
  el._timer = timer;
}

function dismissToast(el){
  clearTimeout(el._timer);
  el.style.opacity = '0';
  el.style.transform = 'translateX(60px) scale(0.9)';
  el.style.transition = 'all 0.3s ease';
  setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); }, 300);
}
</script>
